<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L'OBSERVATEUR - CONTRÔLE TOTAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main: #d4af37; --bg: #0c0e12; --card: #1a1e26; --accent: #7FDBFF; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; height: 100vh; width: 100vw; display: flex; flex-direction: column; overflow: hidden; transition: 0.3s; }
        
        /* ANIMA-CŒUR DYNAMIQUE */
        .plasma-ring { position: absolute; border-radius: 50%; border: 5px solid transparent; border-top-color: var(--accent); border-bottom-color: var(--main); animation: spin 1.5s linear infinite; box-shadow: 0 0 30px var(--accent); z-index: 1; pointer-events: none; }
        @keyframes spin { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

        header { padding: 30px 15px; text-align: center; border-bottom: 3px solid var(--main); background: #0f1217; position: relative; display: flex; align-items: center; justify-content: center; min-height: 100px; }
        header h1 { font-size: 1.3em; letter-spacing: 5px; color: var(--main); text-transform: uppercase; z-index: 10; }
        .creator-tag { position: absolute; bottom: 8px; font-size: 0.7em; color: var(--accent); font-weight: 900; letter-spacing: 3px; }

        .dashboard-info { display: flex; justify-content: space-between; padding: 12px 20px; background: rgba(0,0,0,0.8); font-size: 0.8em; color: var(--accent); border-bottom: 2px solid rgba(212,175,55,0.3); font-weight: 900; }

        .page { display: none; flex: 1; overflow-y: auto; padding: 25px; width: 100%; animation: fadeIn 0.4s ease; }
        .active-page { display: block; }
        .card { background: var(--card); border: 3px solid rgba(212,175,55,0.4); border-radius: 25px; padding: 25px; margin-bottom: 20px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.8); }

        .btn-gold { background: var(--main); color: #000; padding: 18px; border-radius: 35px; border: none; font-weight: 900; text-transform: uppercase; cursor: pointer; font-size: 0.9em; width: 100%; box-shadow: 0 0 15px var(--main); margin-bottom: 10px; }
        select { width: 100%; padding: 15px; background: #000; color: var(--main); border: 2px solid var(--main); border-radius: 12px; margin-bottom: 15px; font-weight: 900; text-align: center; }

        nav { display: flex; background: #0f1217; border-top: 4px solid var(--main); height: 110px; padding-bottom: env(safe-area-inset-bottom); }
        nav button { flex: 1; background: none; border: none; color: #555; font-size: 11px; font-weight: 900; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; }
        nav button.active { color: var(--main); }
        nav button span { font-size: 32px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <div id="ring" class="plasma-ring" style="width:140px; height:140px; top:50%; left:50%;"></div>
        <h1 id="headTitle">L'OBSERVATEUR</h1>
        <div class="creator-tag">CRÉATION DE LESLY MICHEL</div>
    </header>

    <div class="dashboard-info">
        <div id="dateNow">Date</div>
        <div id="timeNow">00:00</div>
        <div id="tempNow">NC: 22°C</div>
    </div>

    <div id="home" class="page active-page">
        <div class="card">
            <h3 id="welcomeMsg" style="color:var(--main);">NOYAU ACTIF</h3>
            <button onclick="startVocal()" style="width:100px; height:100px; border-radius:50%; background:var(--main); border:4px solid #000; margin:20px; font-size:40px; box-shadow: 0 0 20px var(--main);">🎙️</button>
            <p id="transcript" style="color:var(--accent); font-weight:bold;"></p>
        </div>
    </div>

    <div id="vault" class="page">
        <div class="card">
            <h3 style="color:var(--main);">⚙️ CONFIGURATION NOYAU</h3>
            
            <label>COULEUR INTERFACE</label>
            <select onchange="updateColor(this.value)">
                <option value="#d4af37">OR SUPRÊME</option>
                <option value="#7FDBFF">BLEU NÉON</option>
                <option value="#ff4d4d">ROUGE ALERTE</option>
                <option value="#2ECC40">VERT MATRICE</option>
            </select>

            <label>LANGUE SYSTÈME</label>
            <select onchange="updateLang(this.value)">
                <option value="fr-FR">FRANÇAIS</option>
                <option value="ht-HT">KREYÒL AYISYEN</option>
            </select>

            <label>TONALITÉ DE LA VOIX</label>
            <select id="vPitch">
                <option value="0.8">GRAVE (Majordome)</option>
                <option value="1.0">NORMALE</option>
                <option value="1.5">AIGUË (Digitale)</option>
            </select>

            <button class="btn-gold" onclick="saveSettings()">APPLIQUER LES CHANGEMENTS</button>
        </div>
    </div>

    <nav>
        <button class="active" id="nav-home" onclick="showPage('home')"><span>🏠</span>Accueil</button>
        <button id="nav-vault" onclick="showPage('vault')"><span>🔐</span>Paramètres</button>
        <button onclick="location.reload()"><span>🔄</span>Reload</button>
    </nav>

    <script>
        let uLang = 'fr-FR';
        let vPitch = 1.0;

        function updateColor(color) {
            document.documentElement.style.setProperty('--main', color);
            speak(uLang === 'ht-HT' ? "Koulè chanje." : "Couleur mise à jour.");
        }

        function updateLang(lang) {
            uLang = lang;
            document.getElementById('headTitle').innerText = lang === 'ht-HT' ? "L'OBZÈVATÈ" : "L'OBSERVATEUR";
            speak(lang === 'ht-HT' ? "Lang chanje nan kreyòl." : "Langue modifiée en français.");
        }

        function saveSettings() {
            vPitch = parseFloat(document.getElementById('vPitch').value);
            speak(uLang === 'ht-HT' ? "Tout paramèt yo anrejistre." : "Tous les paramètres sont enregistrés.");
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = uLang; u.pitch = vPitch; u.rate = 0.9;
            window.speechSynthesis.speak(u);
        }

        function showPage(p) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active-page'));
            document.getElementById(p).classList.add('active-page');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById('nav-' + p).classList.add('active');
        }

        function startVocal() { speak(uLang === 'ht-HT' ? "Mwen ap koute ou." : "L'unité vous écoute."); }

        setInterval(() => {
            const now = new Date();
            document.getElementById('dateNow').innerText = now.toLocaleDateString('fr-FR', {day:'numeric', month:'short'}).toUpperCase();
            document.getElementById('timeNow').innerText = now.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
        }, 1000);
    </script>
</body>
</html>
