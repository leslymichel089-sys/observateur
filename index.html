<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>L'OBSERVATEUR</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='black' stroke='%23d4af37' stroke-width='5'/><text x='50%25' y='55%25' text-anchor='middle' fill='%23d4af37' font-family='Arial' font-size='40' font-weight='900'>O</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #000; --card: #111; --blue: #00d4ff; --status: #0f0; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; outline: none; }
        body { background: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* ÉCRAN D'ACCÈS BIOMÉTRIQUE / CODE */
        #lock-screen { position: fixed; inset: 0; background: #000; z-index: 100000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        .key { width: 70px; height: 70px; border: 1px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5em; font-weight: 900; color: var(--gold); cursor: pointer; }
        .key:active { background: var(--gold); color: #000; }

        /* DASHBOARD SUPRÊME */
        header { padding: 30px 20px; text-align: center; border-bottom: 2px solid var(--gold); background: #000; position: relative; }
        .status-bar { display: flex; justify-content: space-between; padding: 10px 20px; font-size: 0.8em; font-weight: 900; color: var(--blue); border-bottom: 1px solid #222; }
        .date-xl { font-size: 1.5em; color: var(--gold); font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }

        /* ANIMA-CŒUR VIBRANT */
        .anima-box { height: 200px; display: flex; align-items: center; justify-content: center; position: relative; }
        .orb { width: 100px; height: 100px; background: var(--blue); border-radius: 50%; box-shadow: 0 0 50px var(--blue); transition: 0.3s; z-index: 5; }
        .orb.pulse { animation: breathe 3s infinite ease-in-out; }
        .orb.active { animation: vibrate 0.1s infinite; background: var(--gold); box-shadow: 0 0 70px var(--gold); }
        @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.15); opacity: 1; } }
        @keyframes vibrate { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } 100% { transform: translate(2px, 0); } }

        /* SIDEBAR MAÎTRE */
        .sidebar { position: fixed; top: 0; left: -100%; width: 85%; height: 100%; background: #000; border-right: 3px solid var(--gold); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 50000; padding: 40px 20px; overflow-y: auto; }
        .sidebar.on { left: 0; }
        .side-btn { width: 100%; padding: 18px; background: #111; border: 1px solid var(--gold); color: #fff; margin-bottom: 12px; border-radius: 12px; cursor: pointer; text-align: left; font-weight: 900; font-size: 0.9em; display: flex; align-items: center; }
        .side-btn span { margin-right: 15px; font-size: 1.2em; }

        /* PAGES */
        .page { display: none; flex: 1; overflow-y: auto; padding: 20px; animation: slideUp 0.4s ease-out; }
        .active-page { display: block; }
        .card { background: var(--card); border: 1px solid #333; border-radius: 20px; padding: 25px; margin-bottom: 15px; text-align: center; }
        
        /* MULTIMÉDIA & DOCUMENTS */
        #preview-box { width: 100%; border: 2px solid var(--gold); border-radius: 15px; margin-top: 15px; display: none; background: #000; overflow: hidden; }
        video, iframe { width: 100%; height: 350px; background: #000; }

        /* NAVIGATION */
        nav { display: flex; background: #000; border-top: 3px solid var(--gold); height: 100px; padding-bottom: 20px; }
        nav button { flex: 1; background: none; border: none; color: #444; font-size: 10px; font-weight: 900; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        nav button.sel { color: var(--gold); }
        nav button span { font-size: 26px; margin-bottom: 5px; }

        footer { padding: 10px; text-align: center; font-size: 0.7em; color: #333; font-weight: 900; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body onload="init()">

    <div id="lock-screen">
        <div style="width:80px; height:80px; border:3px solid var(--gold); border-radius:50%; display:flex; align-items:center; justify-content:center; margin-bottom:20px;">
            <span style="color:var(--gold); font-size:40px; font-weight:900;">O</span>
        </div>
        <h2 id="lock-msg" style="color:var(--gold); margin-bottom:20px; letter-spacing:3px;">IDENTIFICATION REQUISE</h2>
        <div id="pin-display" style="font-size:2em; color:var(--blue); letter-spacing:10px; height:40px;"></div>
        <div class="keypad">
            <div class="key" onclick="press(1)">1</div><div class="key" onclick="press(2)">2</div><div class="key" onclick="press(3)">3</div>
            <div class="key" onclick="press(4)">4</div><div class="key" onclick="press(5)">5</div><div class="key" onclick="press(6)">6</div>
            <div class="key" onclick="press(7)">7</div><div class="key" onclick="press(8)">8</div><div class="key" onclick="press(9)">9</div>
            <div class="key" onclick="press('C')" style="border-color:#f00; color:#f00;">X</div><div class="key" onclick="press(0)">0</div><div class="key" onclick="validatePin()" style="border-color:#0f0; color:#0f0;">OK</div>
        </div>
        <button onclick="guestAccess()" style="margin-top:30px; background:none; border:none; color:#555; text-decoration:underline;">AUTRE UTILISATEUR ?</button>
    </div>

    <div id="side" class="sidebar">
        <h2 style="color:var(--gold); margin-bottom:30px; border-bottom:1px solid var(--gold); padding-bottom:10px;">UNITÉ DE CONTRÔLE</h2>
        <button class="side-btn" onclick="cleanSystem()"><span>🧹</span>NETTOYAGE RAM & CACHE</button>
        <button class="side-btn" onclick="generateCV()"><span>📄</span>PRÉPARER CV (PDF)</button>
        <button class="side-tool side-btn" onclick="showP('family'); toggleS();"><span>👥</span>MEMBRES FAMILLE</button>
        <button class="side-btn" onclick="showP('notifs'); toggleS();"><span>🔔</span>SONS & NOTIFICATIONS</button>
        <button class="side-btn" onclick="showP('settings'); toggleS();"><span>⚙️</span>PARAMÈTRES LANGUE</button>
        <button class="side-btn" style="background:var(--gold); color:#000; font-weight:900; justify-content:center; margin-top:20px;" onclick="toggleS()">RETOUR</button>
    </div>

    <div class="status-bar">
        <span id="ram-stat">RAM: 98% LIBRE</span>
        <span id="loc-stat">NC, USA</span>
    </div>

    <header>
        <button onclick="toggleS()" style="position:absolute; left:20px; top:35px; background:none; border:none; color:var(--gold); font-size:35px;">☰</button>
        <div id="xl-date" class="date-xl">CHARGEMENT...</div>
        <div id="xl-time" style="font-size:1.2em; color:var(--blue); font-weight:900; margin-top:5px;">00:00</div>
    </header>

    <div id="home" class="page active-page">
        <div class="anima-box"><div id="orb" class="orb pulse"></div></div>
        <div class="card">
            <h3 id="user-greet" style="color:var(--gold); margin-bottom:15px;">MAJORDOME ACTIF</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:15px;">
                <button class="side-btn" onclick="document.getElementById('fileIn').click()" style="justify-content:center; background:var(--blue); color:#000;">📂 GALERIE</button>
                <button class="side-btn" onclick="openIncognito()" style="justify-content:center; background:var(--gold); color:#000;">🌐 WEB PRIVÉ</button>
            </div>
            <input type="file" id="fileIn" style="display:none;" accept="video/*,audio/*,image/*" onchange="loadMedia(event)">
            
            <div id="preview-box">
                <video id="v-player" controls></video>
                <iframe id="w-frame"></iframe>
            </div>

            <button onclick="startListening()" style="width:90px; height:90px; border-radius:50%; background:var(--gold); border:none; font-size:40px; box-shadow: 0 0 30px var(--gold); margin-top:20px;">🎙️</button>
            <p id="tx-out" style="color:var(--blue); font-style:italic; font-weight:900; margin-top:15px; min-height:1.2em;"></p>
        </div>
    </div>

    <div id="family" class="page">
        <div class="card">
            <h3 style="color:var(--gold);">💎 MEMBRES DE PRESTIGE</h3>
            <div id="family-list" style="text-align:left; margin-top:20px;">
                <p style="padding:10px; border-bottom:1px solid #222;">🛡️ Guerda Michel (Épouse)</p>
                <p style="padding:10px; border-bottom:1px solid #222;">🛡️ Esterlande Michel (Fille)</p>
            </div>
            <button class="side-btn" style="margin-top:20px; justify-content:center;">AJOUTER UN MEMBRE</button>
        </div>
    </div>

    <div id="notifs" class="page">
        <div class="card">
            <h3 style="color:var(--gold);">🔔 ALERTES & SONS</h3>
            <div style="margin-top:20px;">
                <button class="side-btn" onclick="testSound('priorité')">🔊 TEST ALERTE PRIORITÉ</button>
                <button class="side-btn" onclick="testSound('vibration')">📳 TEST VIBRATION SÉCURISÉE</button>
            </div>
        </div>
    </div>

    <footer>© 2026 LESLY MICHEL - TOUS DROITS RÉSERVÉS</footer>

    <nav>
        <button class="sel" onclick="showP('home', this)"><span>🏠</span>ACCUEIL</button>
        <button onclick="alert('Caverne Sécurisée Actve')"><span>🔐</span>CAVERNE</button>
        <button onclick="location.reload()"><span>🔄</span>RESET</button>
    </nav>

    <audio id="snd-click" src="https://www.soundjay.com/buttons/button-16.mp3"></audio>

    <script>
        let pin = "", uLang = "fr-FR", uName = "Lesly Michel", pCount = 0;
        const MASTER_PIN = "1575";

        function playClick() { document.getElementById('snd-click').play(); }

        function press(n) { playClick(); if(n==='C') pin = ""; else if(pin.length < 4) pin += n; document.getElementById('pin-display').innerText = "*".repeat(pin.length); }

        function validatePin() {
            if(pin === MASTER_PIN) {
                document.getElementById('lock-screen').style.display = 'none';
                speak("Bienvenue, Créateur Lesly Michel. L'Observateur est à vos ordres.");
                startAutoMaintenance();
            } else {
                alert("CODE INCORRECT."); pin = ""; document.getElementById('pin-display').innerText = "";
            }
        }

        function guestAccess() { 
            let gName = prompt("Votre Prénom :"); 
            if(gName) {
                let gPin = prompt("Créez votre code d'accès (4 chiffres) :");
                alert("Enregistré. L'Observateur se souviendra de vous, " + gName);
                document.getElementById('lock-screen').style.display = 'none';
                speak("Bienvenue chez Lesly Michel, " + gName);
            }
        }

        function toggleS() { playClick(); document.getElementById('side').classList.toggle('on'); }

        function showP(id, btn) {
            playClick();
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            if(btn) { document.querySelectorAll('nav button').forEach(nb => nb.classList.remove('sel')); btn.classList.add('sel'); }
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t); u.lang = uLang; u.rate = 0.9;
            u.onstart = () => { document.getElementById('orb').classList.add('active'); if(navigator.vibrate) navigator.vibrate(50); };
            u.onend = () => document.getElementById('orb').classList.remove('active');
            window.speechSynthesis.speak(u);
        }

        function startListening() {
            const Rec = window.webkitSpeechRecognition || window.Recognition;
            if(!Rec) return;
            const r = new Rec(); r.lang = uLang;
            r.onresult = (e) => {
                const t = e.results[0][0].transcript.toLowerCase();
                document.getElementById('tx-out').innerText = `"${t}"`;
                if(t.includes("nettoie") || t.includes("clean")) cleanSystem();
                else if(t.includes("galerie")) document.getElementById('fileIn').click();
                else speak("J'assimile votre commande, PDG.");
            };
            r.start();
        }

        function cleanSystem() {
            speak("Lancement du nettoyage de la RAM et de la cache. Optimisation en cours.");
            document.getElementById('ram-stat').innerText = "RAM: NETTOYAGE...";
            setTimeout(() => {
                document.getElementById('ram-stat').innerText = "RAM: 99.9% LIBRE";
                speak("Système purifié. Performance maximale restaurée.");
                if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
            }, 2000);
        }

        function generateCV() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(22); doc.text("CURRICULUM VITAE", 105, 20, null, null, "center");
            doc.setFontSize(14); doc.text("Produit par L'OBSERVATEUR (Système Lesly Michel)", 105, 30, null, null, "center");
            doc.text("Nom : " + uName, 20, 50);
            doc.save("CV_Lesly_Michel.pdf");
            speak("Le document PDF a été généré et archivé.");
        }

        function loadMedia(e) {
            const file = e.target.files[0];
            const url = URL.createObjectURL(file);
            document.getElementById('preview-box').style.display = 'block';
            document.getElementById('w-frame').style.display = 'none';
            const v = document.getElementById('v-player'); v.src = url; v.style.display = 'block'; v.play();
            speak("Fichier multimédia chargé depuis la galerie.");
        }

        function openIncognito() {
            document.getElementById('preview-box').style.display = 'block';
            document.getElementById('v-player').style.display = 'none';
            const f = document.getElementById('w-frame'); f.src = "https://www.google.com/search?igu=1"; f.style.display = 'block';
            speak("Tunnel de navigation privée activé.");
        }

        function startAutoMaintenance() {
            setInterval(() => {
                console.log("Auto-cache cleaning...");
                document.getElementById('ram-stat').style.color = "var(--status)";
            }, 60000);
        }

        function init() {
            setInterval(() => {
                const n = new Date();
                document.getElementById('xl-time').innerText = n.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
                document.getElementById('xl-date').innerText = n.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'}).toUpperCase();
            }, 1000);
        }
    </script>
</body>
</html>
