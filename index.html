<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L'OBSERVATEUR</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #0c0e12; --card: #1a1e26; --blue: #7FDBFF; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 30px; text-align: center; border-bottom: 4px solid var(--gold); background: #0f1217; }
        header h1 { font-size: 1.6em; letter-spacing: 6px; color: var(--gold); text-transform: uppercase; }
        .plasma-container { position: relative; height: 220px; display: flex; align-items: center; justify-content: center; }
        .plasma-ring { position: absolute; border-radius: 50%; border: 5px solid transparent; border-top-color: var(--blue); border-bottom-color: var(--gold); animation: spin 2s linear infinite; box-shadow: 0 0 40px var(--blue); width: 160px; height: 160px; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .page { display: none; flex: 1; overflow-y: auto; padding: 25px; animation: fadeIn 0.4s ease; }
        .active-page { display: block; }
        .card { background: var(--card); border: 3px solid rgba(212,175,55,0.5); border-radius: 25px; padding: 25px; margin-bottom: 25px; text-align: center; }
        nav { display: flex; background: #0f1217; border-top: 4px solid var(--gold); height: 120px; padding-bottom: env(safe-area-inset-bottom); }
        nav button { flex: 1; background: none; border: none; color: #555; font-size: 13px; font-weight: 900; display: flex; flex-direction: column; align-items: center; justify-content: center; text-transform: uppercase; }
        nav button.active { color: var(--gold); }
        nav button span { font-size: 40px; margin-bottom: 8px; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <header><h1>L'OBSERVATEUR</h1></header>
    <div id="home" class="page active-page">
        <div class="plasma-container"><div class="plasma-ring"></div><button onclick="startVocal()" style="z-index:10; background:var(--gold); border-radius:50%; width:80px; height:80px; font-size:40px; border:none;">🎙️</button></div>
        <div class="card"><h3 style="color:var(--gold);">ÉTAT : SUPRÊME</h3><p id="transcript" style="color:var(--blue); margin-top:15px;"></p></div>
    </div>
    <div id="vault" class="page">
        <div class="card"><h3 style="color:var(--gold);">🛠️ OUTILS</h3><button style="width:100%; padding:20px; background:var(--gold); border-radius:30px; font-weight:900; margin-top:10px;" onclick="window.open('https://wa.me/')">WHATSAPP</button></div>
    </div>
    <nav>
        <button class="active" onclick="showPage('home')"><span>🏠</span>Accueil</button>
        <button onclick="showPage('vault')"><span>🔐</span>Caverne</button>
    </nav>
    <script>
        function showPage(p) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active-page'));
            document.getElementById(p).classList.add('active-page');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        }
        function startVocal() { window.speechSynthesis.speak(new SpeechSynthesisUtterance("L'unité est restaurée.")); }
    </script>
</body>
</html>
