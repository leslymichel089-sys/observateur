<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L'OBSERVATEUR</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #0c0e12; --card: #1a1e26; --blue: #7FDBFF; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* ANIMA-CŒUR */
        .plasma-container { position: relative; height: 180px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .plasma-ring { position: absolute; border-radius: 50%; border: 4px solid transparent; border-top-color: var(--blue); border-bottom-color: var(--gold); animation: spin 2s linear infinite; box-shadow: 0 0 30px var(--blue); width: 140px; height: 140px; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        header { padding: 25px; text-align: center; border-bottom: 3px solid var(--gold); background: #0f1217; }
        header h1 { font-size: 1.5em; letter-spacing: 5px; color: var(--gold); text-transform: uppercase; }

        .dashboard-info { display: flex; justify-content: space-between; padding: 12px 20px; background: rgba(0,0,0,0.8); font-size: 0.8em; color: var(--blue); border-bottom: 2px solid var(--gold); }

        .page { display: none; flex: 1; overflow-y: auto; padding: 20px; width: 100%; animation: fadeIn 0.4s ease; }
        .active-page { display: block; }
        
        .card { background: var(--card); border: 2px solid rgba(212,175,55,0.4); border-radius: 20px; padding: 20px; margin-bottom: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        .btn-gold { background: var(--gold); color: #000; padding: 18px; border-radius: 35px; border: none; font-weight: 900; text-transform: uppercase; width: 100%; margin-top: 10px; font-size: 0.9em; box-shadow: 0 5px 15px rgba(212,175,55,0.3); }

        /* NAVIGATION GÉANTE */
        nav { display: flex; background: #0f1217; border-top: 3px solid var(--gold); height: 100px; padding-bottom: env(safe-area-inset-bottom); }
        nav button { flex: 1; background: none; border: none; color: #555; font-size: 12px; font-weight: 900; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        nav button.active { color: var(--gold); }
        nav button span { font-size: 32px; margin-bottom: 5px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <h1>L'OBSERVATEUR</h1>
        <p style="font-size: 0.6em; color: var(--blue); letter-spacing: 2px;">CRÉATION DE LESLY MICHEL</p>
    </header>

    <div class="dashboard-info">
        <div id="dateNow">Date</div>
        <div id="tempNow">NC: 22°C</div>
        <div id="timeNow">00:00</div>
    </div>

    <div id="home" class="page active-page">
        <div class="plasma-container">
            <div class="plasma-ring"></div>
            <button onclick="startVocal()" style="z-index:10; background:none; border:none; font-size:50px;">🎙️</button>
        </div>
        <div class="card">
            <h3 id="welcomeMsg" style="color:var(--gold);">SYSTÈME PRÊT</h3>
            <p id="transcript" style="color:var(--blue); font-weight:bold; margin-top:10px;"></p>
        </div>
    </div>

    <div id="vault" class="page">
        <div class="card">
            <h3 style="color:var(--gold);">🛠️ OUTILS & TRÉSORS</h3>
            <button class="btn-gold" onclick="window.open('https://wa.me/')">💬 OUVRIR WHATSAPP</button>
            <button class="btn-gold" onclick="alert('Génération de CV active...')">📄 GÉNÉRATEUR CV</button>
        </div>
        <div class="card">
            <h3 style="color:var(--gold);">🧠 ASSIMILATION</h3>
            <textarea id="pasteZone" style="width:100%; height:80px; background:#000; border:1px solid var(--gold); border-radius:10px; color:var(--blue); padding:10px; margin-top:10px;" placeholder="Collez ici..."></textarea>
            <button class="btn-gold" style="font-size:12px;" onclick="alert('Assimilation réussie.')">ASSIMILER DANS LE NOYAU</button>
        </div>
        <div class="card">
            <h3 style="color:var(--gold);">⚙️ PARAMÈTRES</h3>
            <p style="font-size:0.8em; color:#888;">Contrôle de la voix et des couleurs (v3.0)</p>
            <button class="btn-gold" style="background:#444; color:#fff;" onclick="location.reload()">🔄 RÉINITIALISER</button>
        </div>
    </div>

    <nav>
        <button class="active" id="btn-home" onclick="showPage('home')"><span>🏠</span>Accueil</button>
        <button id="btn-vault" onclick="showPage('vault')"><span>🔐</span>Caverne</button>
        <button onclick="location.reload()"><span>🔄</span>Reload</button>
    </nav>

    <script>
        function showPage(p) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active-page'));
            document.getElementById(p).classList.add('active-page');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + p).classList.add('active');
        }

        function startVocal() {
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance("L'unité est active, Créateur. Je suis à vos ordres.");
            utter.lang = 'fr-FR'; utter.rate = 0.9;
            synth.speak(utter);
        }

        setInterval(() => {
            const now = new Date();
            document.getElementById('dateNow').innerText = now.toLocaleDateString('fr-FR', {day:'numeric', month:'short'}).toUpperCase();
            document.getElementById('timeNow').innerText = now.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
        }, 1000);
    </script>
</body>
</html>
