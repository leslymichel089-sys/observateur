<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L'OBSERVATEUR - STATION SUPRÊME</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #0c0e12; --card: #1a1e26; --blue: #7FDBFF; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; height: 100vh; width: 100vw; display: flex; flex-direction: column; overflow: hidden; }
        
        header { padding: 30px; text-align: center; border-bottom: 3px solid var(--gold); background: #0f1217; position: relative; }
        header h1 { font-size: 1.4em; letter-spacing: 6px; color: var(--gold); text-transform: uppercase; }

        /* PANNEAU LATÉRAL (SIDEBAR) RESTAURÉ */
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: var(--card); border-right: 3px solid var(--gold); transition: 0.4s; z-index: 10000; padding: 25px; box-shadow: 20px 0 50px #000; }
        .sidebar.active { left: 0; }
        .sidebar h2 { color: var(--gold); border-bottom: 1px solid var(--gold); padding-bottom: 10px; margin-bottom: 20px; font-size: 1.1em; }
        .side-tool { width: 100%; padding: 15px; background: #000; border: 1px solid var(--gold); color: #fff; margin-bottom: 12px; border-radius: 10px; cursor: pointer; text-align: left; font-size: 0.85em; font-weight: 700; }

        .dashboard-info { display: flex; justify-content: space-between; padding: 15px 25px; background: rgba(0,0,0,0.8); font-size: 0.8em; color: var(--blue); border-bottom: 2px solid var(--gold); font-weight: 900; }
        
        .page { display: none; flex: 1; overflow-y: auto; padding: 25px; width: 100%; animation: fadeIn 0.4s ease; }
        .active-page { display: block; }
        .card { background: var(--card); border: 2px solid rgba(212,175,55,0.4); border-radius: 20px; padding: 20px; margin-bottom: 20px; text-align: center; }

        nav { display: flex; background: #0f1217; border-top: 4px solid var(--gold); height: 100px; padding-bottom: env(safe-area-inset-bottom); }
        nav button { flex: 1; background: none; border: none; color: #555; font-size: 11px; font-weight: 900; display: flex; flex-direction: column; align-items: center; justify-content: center; text-transform: uppercase; }
        nav button.active { color: var(--gold); }
        nav button span { font-size: 32px; margin-bottom: 5px; }

        footer { padding: 10px; text-align: center; font-size: 0.7em; color: #444; background: #000; font-weight: 900; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body onload="initUltimateButler()">

    <div id="mySidebar" class="sidebar">
        <h2>🛠️ OUTILS MAÎTRES</h2>
        <button class="side-tool" onclick="window.open('https://www.larousse.fr')">📖 DICTIONNAIRE</button>
        <button class="side-tool" onclick="window.open('https://fr.wikipedia.org')">🌐 ENCYCLOPÉDIE</button>
        <button class="side-tool" onclick="alert('Calculatrice v1.0 active.')">🧮 CALCULATRICE</button>
        <button class="side-tool" onclick="alert('MANUEL: Triple clic titre = Panique. Sidebar = Outils. Caverne = Historique.')">📜 MANUEL D'USAGE</button>
        <button class="btn-gold" style="background:var(--gold); padding:10px; border-radius:10px; margin-top:20px; width:100%; border:none; font-weight:900;" onclick="toggleSidebar()">FERMER</button>
    </div>

    <header>
        <button onclick="toggleSidebar()" style="position:absolute; left:20px; top:35px; background:none; border:none; color:var(--gold); font-size:30px; cursor:pointer; z-index:1001;">☰</button>
        <h1>L'OBSERVATEUR</h1>
    </header>

    <div class="dashboard-info">
        <div id="dateNow">DATE</div>
        <div id="tempDisplay">GREENSBORO, NC</div>
        <div id="timeNow">00:00</div>
    </div>

    <div id="home" class="page active-page">
        <div class="card">
            <h3 id="status" style="color:var(--gold);">MAJORDOME ÉVOLUTIF</h3>
            <button onclick="startVocal()" style="width:100px; height:100px; border-radius:50%; background:var(--gold); border:4px solid #000; margin:20px; font-size:40px; box-shadow: 0 0 25px var(--gold);">🎙️</button>
            <p id="transcript" style="color:var(--blue); font-style:italic; min-height:1.2em;"></p>
        </div>
        <div class="card" id="ideaCard" style="border-color:var(--blue); display:none;">
            <h4 style="color:var(--blue);">💡 ANGLE D'INNOVATION</h4>
            <p id="ideaText" style="font-size:0.85em; margin-top:10px;"></p>
        </div>
    </div>

    <div id="vault" class="page">
        <div class="card">
            <h3 style="color:var(--gold);">🔐 CACHETTE DE LA CAVERNE</h3>
            <div id="updateLogs" style="max-height: 150px; overflow-y: auto; background: #000; border-radius: 10px; margin-top:10px; text-align:left; padding:10px; font-size:0.7em; color:#888;"></div>
        </div>
    </div>

    <footer>© 2026 LESLY MICHEL - TOUS DROITS RÉSERVÉS</footer>

    <nav>
        <button class="active" onclick="showPage('home')"><span>🏠</span>Accueil</button>
        <button onclick="showPage('vault')"><span>🔐</span>Caverne</button>
        <button onclick="location.reload()"><span>🔄</span>Reset</button>
    </nav>

    <script>
        const version = "2.8.0";
        function toggleSidebar() { document.getElementById("mySidebar").classList.toggle("active"); }

        function speak(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'fr-FR'; u.rate = 0.9;
            window.speechSynthesis.speak(u);
        }

        function initUltimateButler() {
            // Check version
            const lastV = localStorage.getItem('obs_v');
            if (lastV !== version) {
                speak(`Mise à jour v${version} terminée. Panneau latéral restauré. Tous les outils sont à nouveau opérationnels, PDG Lesly.`);
                localStorage.setItem('obs_v', version);
            }
            
            // Suggestion innovation
            setTimeout(() => {
                document.getElementById('ideaCard').style.display = 'block';
                document.getElementById('ideaText').innerText = "Considérons l'intégration d'un module de gestion de stock IA pour Lesly Tech LLC.";
                speak("J'ai une nouvelle piste pour votre empire, Créateur.");
            }, 3000);
        }

        function showPage(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active-page'));
            document.getElementById(p).classList.add('active-page');
        }

        function startVocal() {
            const Recognition = window.webkitSpeechRecognition || window.SpeechRecognition;
            const rec = new Recognition();
            rec.onresult = (e) => {
                const cmd = e.results[0][0].transcript.toLowerCase();
                document.getElementById('transcript').innerText = `"${cmd}"`;
                speak("Assimilation en cours pour L'Observateur.");
            };
            rec.start();
        }

        setInterval(() => {
            const n = new Date();
            document.getElementById('dateNow').innerText = n.toLocaleDateString('fr-FR', {day:'numeric', month:'short'}).toUpperCase();
            document.getElementById('timeNow').innerText = n.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
        }, 1000);
    </script>
</body>
</html>
