<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L'OBSERVATEUR</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #050505; --card: #121212; --blue: #00d4ff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* HEADER & DASHBOARD */
        header { padding: 25px; text-align: center; border-bottom: 3px solid var(--gold); background: #000; position: relative; }
        header h1 { font-size: 1.4em; letter-spacing: 5px; color: var(--gold); text-transform: uppercase; }
        .dash-xl { display: grid; grid-template-columns: 1fr 1fr; padding: 15px; background: rgba(20,20,20,0.9); border-bottom: 2px solid var(--gold); text-align: center; }
        .dash-xl div { font-size: 1em; font-weight: 900; color: var(--blue); }
        .date-xl { grid-column: 1 / span 2; font-size: 1.3em !important; color: var(--gold) !important; margin-bottom: 5px; }

        /* SIDEBAR */
        .sidebar { position: fixed; top: 0; left: -100%; width: 85%; height: 100%; background: var(--card); border-right: 3px solid var(--gold); transition: 0.4s; z-index: 10000; padding: 25px; overflow-y: auto; }
        .sidebar.active { left: 0; }
        .side-tool { width: 100%; padding: 15px; background: #000; border: 1px solid var(--gold); color: #fff; margin-bottom: 12px; border-radius: 10px; cursor: pointer; text-align: left; font-weight: 700; }

        /* ANIMA-CŒUR CSS (ZERO IMAGE) */
        .anima-box { height: 150px; display: flex; align-items: center; justify-content: center; position: relative; }
        .orb { width: 80px; height: 80px; background: var(--blue); border-radius: 50%; box-shadow: 0 0 40px var(--blue); transition: 0.3s; z-index: 5; }
        .orb.talking { animation: speak-pulse 0.4s infinite alternate; background: var(--gold); box-shadow: 0 0 60px var(--gold); }
        @keyframes speak-pulse { from { transform: scale(1); } to { transform: scale(1.2); } }

        /* PAGES & CARDS */
        .page { display: none; flex: 1; overflow-y: auto; padding: 20px; animation: fadeIn 0.3s ease; }
        .active-page { display: block; }
        .card { background: var(--card); border: 1px solid #333; border-radius: 20px; padding: 20px; margin-bottom: 15px; text-align: center; }

        /* CALCULATRICE */
        .calc-res { background: #000; color: var(--gold); padding: 15px; text-align: right; font-size: 1.5em; border: 1px solid var(--gold); margin-bottom: 10px; min-height: 60px; border-radius: 8px; }
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .c-btn { padding: 15px; background: #222; border: 1px solid #444; color: white; border-radius: 8px; font-weight: bold; }

        /* LOGIN SCREEN */
        #id-screen { position: fixed; inset: 0; background: #000; z-index: 20000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; }
        .input-supreme { width: 100%; max-width: 300px; padding: 15px; background: #111; border: 2px solid var(--gold); color: #fff; text-align: center; border-radius: 10px; margin-bottom: 15px; }

        nav { display: flex; background: #000; border-top: 3px solid var(--gold); height: 95px; }
        nav button { flex: 1; background: none; border: none; color: #555; font-size: 11px; font-weight: 900; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        nav button.active { color: var(--gold); }
        nav button span { font-size: 28px; margin-bottom: 5px; }

        iframe, video { width: 100%; height: 300px; border: 2px solid var(--gold); border-radius: 15px; margin-top: 15px; display: none; background: #000; }
    </style>
</head>
<body onload="initSystem()">

    <div id="id-screen">
        <h1 style="color:var(--gold); margin-bottom:20px;">L'OBSERVATEUR</h1>
        <p id="welcome-txt" style="font-size:0.85em; color:#888; margin-bottom:20px; max-width:400px; line-height:1.5;"></p>
        <input type="text" id="p-name" class="input-supreme" placeholder="Votre Prénom">
        <select id="p-lang" class="input-supreme">
            <option value="fr-FR">FRANÇAIS</option>
            <option value="ht-HT">KREYÒL AYISYEN</option>
        </select>
        <button onclick="startSession()" style="background:var(--gold); padding:18px; border-radius:35px; border:none; font-weight:900; width:100%; max-width:300px; color:#000;">ACCÉDER AU SYSTÈME</button>
    </div>

    <div id="side" class="sidebar">
        <h2 style="color:var(--gold); border-bottom:2px solid var(--gold); padding-bottom:10px; margin-bottom:20px;">MATRICE D'OUTILS</h2>
        <button class="side-tool" onclick="window.open('https://www.larousse.fr')">📖 DICTIONNAIRE</button>
        <button class="side-tool" onclick="window.open('https://fr.wikipedia.org')">🌐 ENCYCLOPÉDIE</button>
        <button class="side-tool" onclick="showP('vault'); toggleS();">🔐 ACCÈS CAVERNE</button>
        <button class="btn-gold" style="background:var(--gold); padding:15px; border-radius:10px; width:100%; border:none; font-weight:900; margin-top:20px;" onclick="toggleS()">RETOUR</button>
    </div>

    <header>
        <button onclick="toggleS()" style="position:absolute; left:20px; top:35px; background:none; border:none; color:var(--gold); font-size:30px;">☰</button>
        <h1>L'OBSERVATEUR</h1>
    </header>

    <div class="dash-xl">
        <div id="xl-date" class="date-xl">CHARGEMENT...</div>
        <div id="xl-time">00:00</div>
        <div id="xl-temp">SYSTÈME OPÉRATIONNEL</div>
    </div>

    <div id="home" class="page active-page">
        <div class="anima-box"><div id="orb" class="orb"></div></div>
        <div class="card">
            <h3 id="user-greet" style="color:var(--gold); margin-bottom:10px;">FLUX DE COMMANDEMENT</h3>
            <input type="text" id="webUrl" style="width:100%; padding:12px; background:#000; border:1px solid var(--gold); color:#fff; border-radius:10px; margin-bottom:10px; text-align:center;" placeholder="Recherche Web...">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:10px;">
                <button class="side-tool" style="text-align:center; background:var(--gold); color:#000; font-size:0.75em;" onclick="openNav()">🌐 WEB PRIVÉ</button>
                <button class="side-tool" style="text-align:center; background:var(--blue); color:#000; font-size:0.75em;" onclick="document.getElementById('fileIn').click()">📂 GALERIE</button>
            </div>
            <input type="file" id="fileIn" style="display:none;" accept="video/*,audio/*" onchange="loadMedia(event)">
            <iframe id="webFrame"></iframe>
            <video id="mediaPlayer" controls></video>
            <button onclick="startVoice()" style="width:75px; height:75px; border-radius:50%; background:var(--gold); border:none; font-size:35px; box-shadow: 0 0 20px var(--gold); margin-top:10px;">🎙️</button>
            <p id="tx-out" style="color:var(--blue); font-style:italic; font-weight:bold; margin-top:10px; min-height:1em;"></p>
        </div>
    </div>

    <div id="vault" class="page">
        <div class="card">
            <h3 style="color:var(--gold); margin-bottom:15px;">🧮 CALCULATRICE</h3>
            <div id="c-res" class="calc-res">0</div>
            <div class="calc-grid">
                <button class="c-btn" onclick="calc('C')">C</button><button class="c-btn" onclick="calc('/')">/</button><button class="c-btn" onclick="calc('*')">*</button><button class="c-btn" onclick="calc('-')">-</button>
                <button class="c-btn" onclick="calc(7)">7</button><button class="c-btn" onclick="calc(8)">8</button><button class="c-btn" onclick="calc(9)">9</button><button class="c-btn" onclick="calc('+')">+</button>
                <button class="c-btn" onclick="calc(4)">4</button><button class="c-btn" onclick="calc(5)">5</button><button class="c-btn" onclick="calc(6)">6</button><button class="c-btn" onclick="calc('=')" style="background:var(--gold); color:#000;">=</button>
                <button class="c-btn" onclick="calc(1)">1</button><button class="c-btn" onclick="calc(2)">2</button><button class="c-btn" onclick="calc(3)">3</button><button class="c-btn" onclick="calc(0)">0</button>
            </div>
        </div>
        <div class="card">
            <h3 style="color:var(--gold);">📝 ARCHIVES</h3>
            <textarea id="notes-db" style="width:100%; height:100px; background:#000; color:var(--blue); border:1px solid #333; padding:15px; border-radius:10px;"></textarea>
            <button onclick="saveN()" style="width:100%; padding:15px; background:var(--gold); border:none; font-weight:bold; margin-top:10px; border-radius:10px;">SAUVEGARDER</button>
        </div>
    </div>

    <nav>
        <button class="active" id="nh" onclick="showP('home', this)"><span>🏠</span>ACCUEIL</button>
        <button id="nv" onclick="showP('vault', this)"><span>🔐</span>CAVERNE</button>
        <button onclick="location.reload()"><span>🔄</span>RESET</button>
    </nav>

    <script>
        let uLang = 'fr-FR', uName = "", exp = "";
        const wMsg = "Salut, je suis L'OBSERVATEUR, un majordome numérique créé par PDG Lesly Michel, je vous souhaite la bienvenue. D'abord veuillez vous identifier en me donnant simplement votre prénom et votre langue préférée afin que je puisse mémoriser vos préférences dans la base de données interne";

        function toggleS() { document.getElementById('side').classList.toggle('active'); }
        function showP(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = uLang; u.rate = 0.9;
            u.onstart = () => document.getElementById('orb').classList.add('talking');
            u.onend = () => document.getElementById('orb').classList.remove('talking');
            window.speechSynthesis.speak(u);
        }

        function startSession() {
            uName = document.getElementById('p-name').value.trim();
            uLang = document.getElementById('p-lang').value;
            if(!uName) return alert("Nom requis.");
            document.getElementById('id-screen').style.display = 'none';
            document.getElementById('user-greet').innerText = "BIENVENUE, " + uName.toUpperCase();
            speak(uLang === 'fr-FR' ? `Bienvenue ${uName}. Tous les systèmes sont à votre disposition.` : `Byenvini ${uName}. Tout sistèm yo pare pou ou.`);
        }

        function openNav() {
            let url = document.getElementById('webUrl').value;
            if(!url) return;
            if(!url.startsWith('http')) url = 'https://www.google.com/search?igu=1&q=' + url;
            document.getElementById('mediaPlayer').style.display = 'none';
            const f = document.getElementById('webFrame'); f.src = url; f.style.display = 'block';
        }

        function loadMedia(e) {
            const file = e.target.files[0];
            const url = URL.createObjectURL(file);
            document.getElementById('webFrame').style.display = 'none';
            const p = document.getElementById('mediaPlayer'); p.src = url; p.style.display = 'block';
            p.play();
        }

        function startVoice() {
            const Rec = window.webkitSpeechRecognition || window.SpeechRecognition;
            if(!Rec) return;
            const r = new Rec(); r.lang = uLang;
            r.onresult = (e) => {
                const t = e.results[0][0].transcript.toLowerCase();
                document.getElementById('tx-out').innerText = `"${t}"`;
                if(t.includes("ça va") || t.includes("ki jan ou ye")) speak(uLang === 'fr-FR' ? "Je fonctionne parfaitement, Créateur." : "Mwen anfòm, m ap travay byen.");
                else speak("J'assimile votre requête.");
            };
            r.start();
        }

        function calc(v) {
            const s = document.getElementById('c-res');
            if(v==='C'){exp=""; s.innerText="0";}
            else if(v==='='){try{exp=eval(exp); s.innerText=exp;}catch(e){s.innerText="Err";exp="";}}
            else{exp+=v; s.innerText=exp;}
        }

        function saveN() { localStorage.setItem('o_notes', document.getElementById('notes-db').value); alert("Note archivée."); }

        function initSystem() {
            document.getElementById('welcome-txt').innerText = wMsg;
            document.getElementById('notes-db').value = localStorage.getItem('o_notes') || "";
            document.body.addEventListener('click', () => {
                if(document.getElementById('id-screen').style.display !== 'none') speak(wMsg);
            }, {once: true});
            setInterval(() => {
                const n = new Date();
                document.getElementById('xl-time').innerText = n.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
                document.getElementById('xl-date').innerText = n.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'}).toUpperCase();
            }, 1000);
        }
    </script>
</body>
</html>
