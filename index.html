<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L'OBSERVATEUR - STATION SUPRÊME</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main: #d4af37; --bg: #0c0e12; --card: #1a1e26; --accent: #7FDBFF; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background-color: var(--bg); background-size: cover; background-position: center; color: #fff; font-family: 'Montserrat', sans-serif; height: 100vh; width: 100vw; display: flex; flex-direction: column; overflow: hidden; }
        
        /* HEADER & DASHBOARD AGRANDI */
        header { padding: 30px; text-align: center; border-bottom: 3px solid var(--main); background: rgba(15, 18, 23, 0.95); position: relative; cursor: pointer; }
        header h1 { font-size: 1.5em; letter-spacing: 6px; color: var(--main); text-transform: uppercase; }
        
        .dashboard-xl { display: grid; grid-template-columns: 1fr 1fr; padding: 20px; background: rgba(0,0,0,0.7); border-bottom: 2px solid var(--main); text-align: center; }
        .dashboard-xl div { font-size: 1.2em; font-weight: 900; color: var(--accent); }
        .date-xl { grid-column: 1 / span 2; font-size: 1.5em !important; color: var(--main) !important; margin-bottom: 10px; }

        /* PANNEAU LATÉRAL COULISSANT */
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: var(--card); border-right: 3px solid var(--main); transition: 0.4s; z-index: 10000; padding: 20px; box-shadow: 20px 0 50px rgba(0,0,0,0.9); }
        .sidebar.active { left: 0; }
        .sidebar h2 { color: var(--main); border-bottom: 1px solid var(--main); padding-bottom: 10px; margin-bottom: 20px; font-size: 1.1em; }
        .side-tool { width: 100%; padding: 12px; background: #000; border: 1px solid var(--main); color: #fff; margin-bottom: 10px; border-radius: 8px; font-size: 0.8em; text-align: left; cursor: pointer; }

        .page { display: none; flex: 1; overflow-y: auto; padding: 20px; animation: fadeIn 0.4s ease; }
        .active-page { display: block; }
        .card { background: rgba(26, 30, 38, 0.9); border: 2px solid var(--main); border-radius: 20px; padding: 20px; margin-bottom: 20px; }

        /* ESPACE NOTES & HISTOIRE */
        textarea { width: 100%; height: 150px; background: #000; color: var(--accent); border: 2px solid var(--main); border-radius: 12px; padding: 15px; font-family: inherit; margin-top: 10px; }
        
        /* FOOTER COPYRIGHT */
        footer { padding: 15px; text-align: center; font-size: 0.7em; color: #555; background: #000; font-weight: 700; letter-spacing: 1px; }

        /* NAV */
        nav { display: flex; background: #0f1217; border-top: 3px solid var(--main); height: 90px; }
        nav button { flex: 1; background: none; border: none; color: #555; font-size: 10px; font-weight: 900; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        nav button.active { color: var(--main); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="mySidebar" class="sidebar">
        <h2 id="sideTitle">OUTILS UTILES</h2>
        <button class="side-tool" onclick="window.open('https://www.larousse.fr')">📖 DICTIONNAIRE</button>
        <button class="side-tool" onclick="window.open('https://fr.wikipedia.org')">🌐 ENCYCLOPÉDIE</button>
        <button class="side-tool" onclick="openCalc()">🧮 CALCULATRICE</button>
        <button class="side-tool" onclick="alert('MANUEL: 1. Triple clic titre = Panique. 2. Caverne = Outils secrets. 3. Sidebar = Recherche.')">📜 MANUEL D'UTILISATION</button>
        <button class="btn-gold" onclick="toggleSidebar()" style="margin-top:20px;">FERMER</button>
    </div>

    <header onclick="handleHeaderClick()">
        <h1 id="mainTitle">L'OBSERVATEUR</h1>
        <button onclick="toggleSidebar()" style="position:absolute; left:20px; top:35px; background:none; border:none; color:var(--main); font-size:25px;">☰</button>
    </header>

    <div class="dashboard-xl">
        <div id="dateXl" class="date-xl">MARDI 24 MARS</div>
        <div id="timeXl">06:52</div>
        <div id="tempXl">PORT-AU-PRINCE: 28°C</div>
    </div>

    <div id="home" class="page active-page">
        <div class="card">
            <input type="text" id="webUrl" class="input-supreme" placeholder="Recherche ou YouTube..." style="width:100%; padding:15px; background:#000; border:2px solid var(--main); color:#fff; border-radius:10px; margin-bottom:10px;">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <button class="btn-gold" style="background:var(--main); padding:15px; border-radius:10px;" onclick="openWeb()">WEB</button>
                <button class="btn-gold" style="background:var(--main); padding:15px; border-radius:10px;" onclick="openMedia()">YOUTUBE</button>
            </div>
            <iframe id="webFrame" style="width:100%; height:300px; display:none; margin-top:15px; border:1px solid var(--main);"></iframe>
        </div>
    </div>

    <div id="vault" class="page">
        <div class="card">
            <h3 id="noteTitle" style="color:var(--main);">📝 BLOC-NOTES</h3>
            <textarea id="userNotes" placeholder="Notez vos pensées ici..."></textarea>
            <button class="btn-gold" onclick="saveNotes()" style="background:var(--accent); margin-top:5px; padding:10px; border-radius:5px;">SAUVEGARDER</button>
        </div>

        <div class="card">
            <h3 id="storyTitle" style="color:var(--main);">🎙️ HISTOIRE AUDIO</h3>
            <input type="text" id="storyTopic" placeholder="Sujet de l'histoire..." style="width:100%; padding:10px; margin-top:10px; background:#000; border:1px solid var(--main); color:#fff;">
            <button class="btn-gold" onclick="tellStory()" style="background:var(--main); margin-top:10px; padding:10px; border-radius:5px;">RACONTE-MOI</button>
        </div>

        <div class="card">
            <h3 style="color:var(--main);">📅 CALENDRIER</h3>
            <div id="calendar" style="font-size:0.9em; margin-top:10px; color:var(--accent);"></div>
        </div>
    </div>

    <footer>
        © 2026 LESLY MICHEL - TOUS DROITS RÉSERVÉS
    </footer>

    <nav>
        <button class="active" onclick="showPage('home')"><span>🏠</span>ACCUEIL</button>
        <button onclick="showPage('vault')"><span>🔐</span>CAVERNE</button>
        <button onclick="location.reload()"><span>🔄</span>RESET</button>
    </nav>

    <script>
        let uLang = 'fr-FR';
        let clickCount = 0;

        function toggleSidebar() { document.getElementById("mySidebar").classList.toggle("active"); }

        function speak(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = uLang; u.rate = 0.8;
            window.speechSynthesis.speak(u);
        }

        function tellStory() {
            const topic = document.getElementById('storyTopic').value;
            const text = uLang === 'ht-HT' ? `Koute istwa sou ${topic}. Nan tan lontan...` : `Voici l'histoire de ${topic}. Il était une fois...`;
            speak(text + " (L'unité génère le récit en temps réel)");
        }

        function saveNotes() { localStorage.setItem('obs_notes', document.getElementById('userNotes').value); alert("Notes enregistrées."); }

        function handleHeaderClick() {
            clickCount++;
            setTimeout(() => clickCount = 0, 1000);
            if(clickCount === 3) { 
                document.getElementById('webFrame').style.display='none'; 
                document.getElementById('webFrame').src=''; 
                showPage('home'); 
                speak("Protocole Panique activé."); 
            }
        }

        function openWeb() {
            const val = document.getElementById('webUrl').value;
            const url = val.startsWith('http') ? val : 'https://www.google.com/search?q=' + val;
            const f = document.getElementById('webFrame');
            f.src = url; f.style.display = 'block';
        }

        function showPage(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active-page'));
            document.getElementById(p).classList.add('active-page');
            document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active'));
        }

        // Initialisation Calendrier & Heure
        setInterval(() => {
            const n = new Date();
            document.getElementById('timeXl').innerText = n.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
            document.getElementById('dateXl').innerText = n.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'}).toUpperCase();
        }, 1000);

        window.onload = () => {
            document.getElementById('userNotes').value = localStorage.getItem('obs_notes') || "";
            document.getElementById('calendar').innerText = new Date().toDateString();
        };
    </script>
</body>
</html>
