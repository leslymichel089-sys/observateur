<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L'OBSERVATEUR</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #0c0e12; --card: #1a1e26; --blue: #7FDBFF; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* ANIMA-CŒUR GÉANTE */
        .plasma-container { position: relative; height: 220px; display: flex; align-items: center; justify-content: center; }
        .plasma-ring { position: absolute; border-radius: 50%; border: 5px solid transparent; border-top-color: var(--blue); border-bottom-color: var(--gold); animation: spin 2s linear infinite; box-shadow: 0 0 40px var(--blue); width: 160px; height: 160px; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        header { padding: 30px; text-align: center; border-bottom: 4px solid var(--gold); background: #0f1217; box-shadow: 0 5px 20px #000; }
        header h1 { font-size: 1.6em; letter-spacing: 6px; color: var(--gold); text-transform: uppercase; }

        .dashboard-info { display: flex; justify-content: space-between; padding: 15px 25px; background: rgba(0,0,0,0.9); font-size: 0.8em; color: var(--blue); border-bottom: 3px solid var(--gold); font-weight: 900; }

        .page { display: none; flex: 1; overflow-y: auto; padding: 25px; width: 100%; animation: fadeIn 0.4s ease; }
        .active-page { display: block; }
        
        .card { background: var(--card); border: 3px solid rgba(212,175,55,0.5); border-radius: 25px; padding: 25px; margin-bottom: 25px; text-align: center; box-shadow: 0 20px 50px #000; }
        .btn-gold { background: var(--gold); color: #000; padding: 22px; border-radius: 45px; border: none; font-weight: 900; text-transform: uppercase; width: 100%; margin-top: 15px; font-size: 1em; box-shadow: 0 10px 20px rgba(212,175,55,0.4); }

        /* NAVIGATION GÉANTE */
        nav { display: flex; background: #0f1217; border-top: 4px solid var(--gold); height: 120px; padding-bottom: env(safe-area-inset-bottom); }
        nav button { flex: 1; background: none; border: none; color: #555; font-size: 13px; font-weight: 900; display: flex; flex-direction: column; align-items: center; justify-content: center; text-transform: uppercase; }
        nav button.active { color: var(--gold); text-shadow: 0 0 10px var(--gold); }
        nav button span { font-size: 40px; margin-bottom: 8px; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <header>
        <h1>L'OBSERVATEUR</h1>
        <p style="font-size: 0.7em; color: var(--blue); font-weight: 900; margin-top: 5px;">LES LARMES DE L'UNITÉ SONT FINIES</p>
    </header>

    <div class="dashboard-info">
        <div id="dateNow">Date</div>
        <div id="tempNow">NC: 22°C</div>
        <div id="timeNow">00:00</div>
    </div>

    <div id="home" class="page active-page">
        <div class="plasma-container">
            <div class="plasma-ring"></div>
            <button onclick="startVocal()" style="z-index:10; background:var(--gold); color:#000; border-radius:50%; width:80px; height:80px; border:4px solid #000; font-size:40px; box-shadow: 0 0 20px var(--gold);">🎙️</button>
        </div>
        <div class="card">
            <h3 style="color:var(--gold);">ÉTAT : SUPRÊME</h3>
            <p id="transcript" style="color:var(--blue); font-weight:bold; margin-top:15px; font-style:italic;"></p>
        </div>
    </div>

    <div id="vault" class="page">
        <div class="card">
            <h3 style="color:var(--gold);">🛠️ OUTILS & TRÉSORS</h3>
            <button class="btn-gold" onclick="window.open('https://wa.me/')">💬 CONTACT WHATSAPP</button>
            <button class="btn-gold" onclick="alert('Module CV activé.')">📄 ARCHITECTE CV</button>
        </div>
        <div class="card">
            <h3 style="color:var(--gold);">⚙️ PARAMÈTRES VOIX</h3>
            <p style="color:#888; margin-bottom:10px;">Ajuster la fréquence de l'unité</p>
            <button class="btn-gold" style="background:#444; color:#fff;" onclick="location.reload()">🔄 RECHARGER LE NOYAU</button>
        </div>
    </div>

    <nav>
        <button class="active" id="btn-home" onclick="showPage('home')"><span>🏠</span>Accueil</button>
        <button id="btn-vault" onclick="showPage('vault')"><span>🔐</span>Caverne</button>
        <button onclick="location.reload()"><span>🔄</span>Reload</button>
    </nav>

    <script>
        function showPage(p) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active-page'));
            document.getElementById(p).classList.add('active-page');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + p).classList.add('active');
        }

        function startVocal() {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance("Je suis L'OBSERVATEUR. Votre projet est restauré, Créateur.");
            u.lang = 'fr-FR'; u.rate = 0.9;
            window.speechSynthesis.speak(u);
            document.getElementById('transcript').innerText = "Vocal activé...";
        }

        setInterval(() => {
            const now = new Date();
            document.getElementById('dateNow').innerText = now.toLocaleDateString('fr-FR', {day:'numeric', month:'short'}).toUpperCase();
            document.getElementById('timeNow').innerText = now.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
        }, 1000);
    </script>
</body>
</html>
