<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>L'OBSERVATEUR</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='black' stroke='%23d4af37' stroke-width='5'/><text x='50%25' y='55%25' text-anchor='middle' fill='%23d4af37' font-family='Arial' font-size='40' font-weight='900'>O</text></svg>">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #000; --card: #111; --blue: #00d4ff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* VERROUILLAGE SÉCURISÉ */
        #lock-screen { position: fixed; inset: 0; background: #000; z-index: 100000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 25px; }
        .key { width: 75px; height: 75px; border: 1px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5em; font-weight: 900; color: var(--gold); cursor: pointer; }
        .key:active { background: var(--gold); color: #000; }

        /* DASHBOARD PRESTIGE */
        header { padding: 30px 20px; text-align: center; border-bottom: 3px solid var(--gold); background: #000; position: relative; }
        .date-xl { font-size: 1.4em; color: var(--gold); font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }
        .status-bar { display: flex; justify-content: space-between; padding: 8px 20px; font-size: 0.8em; color: var(--blue); border-bottom: 1px solid #222; font-weight: 900; }

        /* ANIMA-CŒUR VIBRANT */
        .anima-box { height: 180px; display: flex; align-items: center; justify-content: center; position: relative; }
        .orb { width: 90px; height: 90px; background: var(--blue); border-radius: 50%; box-shadow: 0 0 50px var(--blue); transition: 0.3s; animation: breathe 3s infinite ease-in-out; }
        .orb.active { animation: vibrate 0.1s infinite !important; background: var(--gold); box-shadow: 0 0 70px var(--gold); }
        @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }
        @keyframes vibrate { from { transform: translate(1px, 1px); } to { transform: translate(-1px, -1px); } }

        /* SIDEBAR & PAGES */
        .sidebar { position: fixed; top: 0; left: -100%; width: 85%; height: 100%; background: #000; border-right: 3px solid var(--gold); transition: 0.4s; z-index: 50000; padding: 30px; }
        .sidebar.on { left: 0; }
        .side-btn { width: 100%; padding: 18px; background: #111; border: 1px solid var(--gold); color: #fff; margin-bottom: 12px; border-radius: 12px; cursor: pointer; text-align: left; font-weight: 900; display: flex; align-items: center; }

        .page { display: none; flex: 1; overflow-y: auto; padding: 20px; }
        .active-page { display: block; }
        .card { background: var(--card); border: 1px solid #333; border-radius: 20px; padding: 25px; margin-bottom: 15px; text-align: center; }

        #preview-box { width: 100%; border: 2px solid var(--gold); border-radius: 15px; margin-top: 15px; display: none; background: #000; overflow: hidden; }
        video, iframe { width: 100%; height: 320px; background: #000; }

        nav { display: flex; background: #000; border-top: 3px solid var(--gold); height: 95px; }
        nav button { flex: 1; background: none; border: none; color: #444; font-size: 11px; font-weight: 900; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        nav button.sel { color: var(--gold); }
        nav button span { font-size: 28px; margin-bottom: 5px; }
    </style>
</head>
<body onload="init()">

    <div id="lock-screen">
        <h1 style="color:var(--gold); margin-bottom:10px; letter-spacing:5px;">L'OBSERVATEUR</h1>
        <p id="lock-msg" style="color:#666; font-size:0.8em; margin-bottom:20px;">IDENTIFICATION REQUISE (1575)</p>
        <div id="pin-dots" style="font-size:2.5em; color:var(--blue); letter-spacing:10px; height:40px;"></div>
        <div class="keypad">
            <div class="key" onclick="press(1)">1</div><div class="key" onclick="press(2)">2</div><div class="key" onclick="press(3)">3</div>
            <div class="key" onclick="press(4)">4</div><div class="key" onclick="press(5)">5</div><div class="key" onclick="press(6)">6</div>
            <div class="key" onclick="press(7)">7</div><div class="key" onclick="press(8)">8</div><div class="key" onclick="press(9)">9</div>
            <div class="key" onclick="press('C')" style="color:#f00; border-color:#f00;">X</div><div class="key" onclick="press(0)">0</div><div class="key" onclick="validate()" style="color:#0f0; border-color:#0f0;">OK</div>
        </div>
    </div>

    <div id="side" class="sidebar">
        <h2 style="color:var(--gold); margin-bottom:30px; border-bottom:1px solid var(--gold); padding-bottom:10px;">CONTRÔLE MAÎTRE</h2>
        <button class="side-btn" onclick="cleanRAM()"><span>🧹</span>NETTOYAGE RAM / CACHE</button>
        <button class="side-btn" onclick="generateCV()"><span>📄</span>PRÉPARER CV (PDF)</button>
        <button class="side-btn" onclick="showP('family'); toggleS();"><span>👥</span>MEMBRES FAMILLE</button>
        <button class="side-btn" onclick="toggleS()"><span>RETOUR</span></button>
    </div>

    <div class="status-bar">
        <span id="ram-info">RAM: 98% LIBRE</span>
        <span id="loc-info">NC, USA</span>
    </div>

    <header onclick="checkPanic()">
        <button onclick="toggleS()" style="position:absolute; left:20px; top:35px; background:none; border:none; color:var(--gold); font-size:30px;">☰</button>
        <div id="xl-date" class="date-xl">-- MARS 2026</div>
        <div id="xl-time" style="color:var(--blue); font-weight:900; margin-top:5px;">00:00</div>
    </header>

    <div id="home" class="page active-page">
        <div class="anima-box"><div id="orb" class="orb"></div></div>
        <div class="card">
            <h3 id="greet" style="color:var(--gold); margin-bottom:15px;">MAJORDOME SOUVERAIN</h3>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <button class="side-btn" onclick="document.getElementById('fileIn').click()" style="justify-content:center; background:var(--blue); color:#000;">📂 GALERIE</button>
                <button class="side-btn" onclick="openWeb()" style="justify-content:center; background:var(--gold); color:#000;">🌐 WEB PRIVÉ</button>
            </div>
            <input type="file" id="fileIn" style="display:none;" onchange="loadMedia(event)">
            
            <div id="preview-box">
                <video id="v-play" controls></video>
                <iframe id="w-frame"></iframe>
            </div>

            <button onclick="listen()" style="width:85px; height:85px; border-radius:50%; background:var(--gold); border:none; font-size:40px; box-shadow: 0 0 25px var(--gold); margin-top:20px;">🎙️</button>
            <p id="tx-out" style="color:var(--blue); font-style:italic; font-weight:900; margin-top:15px;"></p>
        </div>
    </div>

    <div id="family" class="page">
        <div class="card">
            <h3 style="color:var(--gold);">💎 UNITÉ FAMILIALE</h3>
            <div style="text-align:left; margin-top:20px;">
                <p>🛡️ Guerda Michel (Priorité)</p>
                <p>🛡️ Esterlande Michel (Priorité)</p>
            </div>
        </div>
    </div>

    <footer>© 2026 LESLY MICHEL - TOUS DROITS RÉSERVÉS</footer>

    <nav>
        <button class="sel" onclick="showP('home', this)"><span>🏠</span>ACCUEIL</button>
        <button onclick="alert('Caverne Sécurisée')"><span>🔐</span>CAVERNE</button>
        <button onclick="location.reload()"><span>🔄</span>RESET</button>
    </nav>

    <script>
        let pin = "", uLang = "fr-FR", pCount = 0;
        const MASTER = "1575";

        function press(n) { if(n==='C') pin=""; else if(pin.length<4) pin+=n; document.getElementById('pin-dots').innerText="*".repeat(pin.length); }
        function validate() { 
            if(pin === MASTER) { document.getElementById('lock-screen').style.display='none'; speak("Bienvenue, Créateur Lesly Michel."); } 
            else { alert("ACCÈS REFUSÉ."); pin=""; document.getElementById('pin-dots').innerText=""; }
        }

        function toggleS() { document.getElementById('side').classList.toggle('on'); }
        function showP(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            if(btn) { document.querySelectorAll('nav button').forEach(b => b.classList.remove('sel')); btn.classList.add('sel'); }
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t); u.lang = uLang; u.rate = 0.9;
            u.onstart = () => document.getElementById('orb').classList.add('active');
            u.onend = () => document.getElementById('orb').classList.remove('active');
            window.speechSynthesis.speak(u);
        }

        function listen() {
            const Rec = window.webkitSpeechRecognition || window.SpeechRecognition;
            if(!Rec) return;
            const r = new Rec(); r.lang = uLang;
            r.onresult = (e) => {
                const t = e.results[0][0].transcript.toLowerCase();
                document.getElementById('tx-out').innerText = `"${t}"`;
                speak("Assimilation terminée.");
            };
            r.start();
        }

        function cleanRAM() {
            speak("Purge de la cache et de la RAM lancée.");
            document.getElementById('ram-info').innerText = "RAM: 99.9% LIBRE";
            setTimeout(() => { speak("Nettoyage de prestige terminé."); toggleS(); }, 1500);
        }

        function generateCV() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("CURRICULUM VITAE - LESLY MICHEL", 10, 10);
            doc.save("CV_LESLY_MICHEL.pdf");
            speak("Le document PDF a été généré avec succès.");
        }

        function loadMedia(e) {
            const f = e.target.files[0];
            const url = URL.createObjectURL(f);
            document.getElementById('preview-box').style.display='block';
            document.getElementById('w-frame').style.display='none';
            const v = document.getElementById('v-play'); v.src=url; v.style.display='block'; v.play();
            speak("Lecture multimédia en cours.");
        }

        function openWeb() {
            document.getElementById('preview-box').style.display='block';
            document.getElementById('v-play').style.display='none';
            const w = document.getElementById('w-frame'); w.src="https://www.google.com/search?igu=1"; w.style.display='block';
            speak("Navigation privée active.");
        }

        function init() {
            if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
            setInterval(() => {
                const n = new Date();
                document.getElementById('xl-time').innerText = n.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
                document.getElementById('xl-date').innerText = n.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'}).toUpperCase();
            }, 1000);
        }
        function checkPanic() { pCount++; setTimeout(()=>pCount=0, 1000); if(pCount===3) location.reload(); }
    </script>
</body>
</html>
