<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>L'OBSERVATEUR</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='black' stroke='%23d4af37' stroke-width='5'/><text x='50%25' y='55%25' text-anchor='middle' fill='%23d4af37' font-family='Arial' font-size='40' font-weight='900'>O</text></svg>">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #000; --card: #111; --blue: #00d4ff; --urgency: #f00; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; outline: none; }
        body { background: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* VERROUILLAGE SÉCURISÉ */
        #lock-screen { position: fixed; inset: 0; background: #000; z-index: 100000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 25px; }
        .key { width: 75px; height: 75px; border: 1px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8em; font-weight: 900; color: var(--gold); cursor: pointer; transition: 0.2s; }
        .key:active { background: var(--gold); color: #000; }

        /* DASHBOARD */
        header { padding: 30px 20px; text-align: center; border-bottom: 3px solid var(--gold); background: #000; position: relative; }
        .date-xl { font-size: 1.5em; color: var(--gold); font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }
        .status-bar { display: flex; justify-content: space-between; padding: 10px 20px; font-size: 0.8em; color: var(--blue); border-bottom: 1px solid #222; font-weight: 900; }

        /* ANIMA-CŒUR */
        .anima-box { height: 180px; display: flex; align-items: center; justify-content: center; position: relative; }
        .orb { width: 100px; height: 100px; background: var(--blue); border-radius: 50%; box-shadow: 0 0 50px var(--blue); transition: 0.3s; animation: breathe 3s infinite ease-in-out; }
        @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }

        /* SIDEBAR COMPLÈTE */
        .sidebar { position: fixed; top: 0; left: -100%; width: 85%; height: 100%; background: #000; border-right: 3px solid var(--gold); transition: 0.5s; z-index: 50000; padding: 40px 20px; overflow-y: auto; }
        .sidebar.on { left: 0; }
        .side-btn { width: 100%; padding: 18px; background: #111; border: 1px solid var(--gold); color: #fff; margin-bottom: 12px; border-radius: 12px; cursor: pointer; text-align: left; font-weight: 900; display: flex; align-items: center; }

        /* PAGES & CALCULATRICE */
        .page { display: none; flex: 1; overflow-y: auto; padding: 20px; }
        .active-page { display: block; }
        .card { background: var(--card); border: 1px solid #333; border-radius: 20px; padding: 25px; margin-bottom: 15px; text-align: center; }
        .c-res { background: #000; color: var(--gold); padding: 15px; text-align: right; font-size: 2em; border: 1px solid var(--gold); border-radius: 12px; margin-bottom: 10px; min-height: 60px; font-weight: 900; }
        .c-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .c-btn { padding: 15px; background: #222; border: 1px solid #444; color: #fff; border-radius: 10px; font-weight: 900; }

        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid var(--gold); color: #fff; border-radius: 8px; margin-bottom: 10px; }
        
        #preview-box { width: 100%; border: 2px solid var(--gold); border-radius: 15px; margin-top: 15px; display: none; overflow: hidden; }
        video, iframe { width: 100%; height: 350px; background: #000; }

        nav { display: flex; background: #000; border-top: 3px solid var(--gold); height: 100px; padding-bottom: 20px; }
        nav button { flex: 1; background: none; border: none; color: #444; font-size: 11px; font-weight: 900; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        nav button.sel { color: var(--gold); }
        nav button span { font-size: 28px; margin-bottom: 5px; }
    </style>
</head>
<body onload="init()">

    <div id="lock-screen">
        <h1 style="color:var(--gold); margin-bottom:20px; letter-spacing:5px;">L'OBSERVATEUR</h1>
        <div id="pin-display" style="font-size:3em; color:var(--blue); letter-spacing:10px; height:50px;"></div>
        <div class="keypad">
            <div class="key" onclick="press(1)">1</div><div class="key" onclick="press(2)">2</div><div class="key" onclick="press(3)">3</div>
            <div class="key" onclick="press(4)">4</div><div class="key" onclick="press(5)">5</div><div class="key" onclick="press(6)">6</div>
            <div class="key" onclick="press(7)">7</div><div class="key" onclick="press(8)">8</div><div class="key" onclick="press(9)">9</div>
            <div class="key" onclick="press('C')" style="color:var(--urgency);">X</div><div class="key" onclick="press(0)">0</div><div class="key" onclick="validatePin()">OK</div>
        </div>
    </div>

    <div id="side" class="sidebar">
        <h2 style="color:var(--gold); margin-bottom:30px; border-bottom:1px solid var(--gold);">CONTRÔLE TOTAL</h2>
        <button class="side-btn" onclick="cleanSystem()"><span>🧹</span>NETTOYAGE RAM & CACHE</button>
        <button class="side-btn" onclick="showP('family'); toggleS();"><span>👥</span>MEMBRES FAMILLE</button>
        <button class="side-btn" onclick="showP('config'); toggleS();"><span>⚙️</span>LANGUE & COULEURS</button>
        <button class="side-btn" onclick="window.open('https://fr.wikipedia.org')"><span>🌐</span>ENCYCLOPÉDIE</button>
        <button class="side-btn" onclick="window.open('https://www.larousse.fr')"><span>📖</span>DICTIONNAIRE</button>
        <button class="side-btn" onclick="toggleS()" style="background:var(--gold); color:#000; justify-content:center;">RETOUR</button>
    </div>

    <div class="status-bar">
        <span id="ram-stat">RAM: 98% LIBRE</span>
        <span id="loc-stat">NC, USA - 72°F</span>
    </div>

    <header>
        <button onclick="toggleS()" style="position:absolute; left:20px; top:35px; background:none; border:none; color:var(--gold); font-size:30px;">☰</button>
        <div id="xl-date" class="date-xl">MARS 2026</div>
        <div id="xl-time" style="font-size:1.4em; color:var(--blue); font-weight:900; margin-top:5px;">00:00:00 AM</div>
    </header>

    <div id="home" class="page active-page">
        <div class="anima-box"><div id="orb" class="orb"></div></div>
        <div class="card">
            <h3 style="color:var(--gold); margin-bottom:15px;">MAJORDOME SOUVERAIN</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button class="side-btn" onclick="document.getElementById('fileIn').click()" style="justify-content:center; background:var(--blue); color:#000;">📂 GALERIE</button>
                <button class="side-btn" onclick="openIncognito()" style="justify-content:center; background:var(--gold); color:#000;">🌐 WEB PRIVÉ</button>
            </div>
            <input type="file" id="fileIn" style="display:none;" onchange="loadMedia(event)">
            <div id="preview-box"><video id="v-player" controls></video><iframe id="w-frame"></iframe></div>
        </div>
    </div>

    <div id="vault" class="page">
        <div class="card">
            <h3 style="color:var(--gold); margin-bottom:15px;">OUTILS DE LA CAVERNE</h3>
            <div class="c-res" id="c-res">0</div>
            <div class="c-grid">
                <button class="c-btn" onclick="k('C')">C</button><button class="c-btn" onclick="k('/')">/</button><button class="c-btn" onclick="k('*')">*</button><button class="c-btn" onclick="k('-')">-</button>
                <button class="c-btn" onclick="k(7)">7</button><button class="c-btn" onclick="k(8)">8</button><button class="c-btn" onclick="k(9)">9</button><button class="c-btn" onclick="k('+')">+</button>
                <button class="c-btn" onclick="k('=')" style="background:var(--gold); color:#000; grid-row: span 2;">=</button>
                <button class="c-btn" onclick="k(0)">0</button>
            </div>
            <textarea id="notes-db" style="width:100%; height:100px; background:#000; color:var(--blue); border:1px solid #333; margin-top:15px; padding:10px; border-radius:10px;" placeholder="Bloc-notes..."></textarea>
        </div>
    </div>

    <div id="family" class="page">
        <div class="card">
            <h3 style="color:var(--gold); margin-bottom:15px;">UNITÉ FAMILIALE</h3>
            <div id="f-list" style="text-align:left; margin-bottom:15px;">
                <p style="padding:10px; border-bottom:1px solid #222;">🛡️ Guerda Michel (Épouse)</p>
                <p style="padding:10px; border-bottom:1px solid #222;">🛡️ Esterlande Belfond (Fille)</p>
            </div>
            <input type="text" id="new-mem" placeholder="Nom">
            <input type="text" id="new-rel" placeholder="Relation">
            <button onclick="addMem()" style="width:100%; padding:15px; background:var(--blue); border:none; border-radius:10px; font-weight:900;">ENREGISTRER MEMBRE</button>
        </div>
    </div>

    <div id="config" class="page">
        <div class="card">
            <h3 style="color:var(--gold);">PARAMÈTRES</h3>
            <p style="margin-top:10px;">LANGUE</p>
            <select><option>Français</option><option>Kreyòl</option></select>
            <p style="margin-top:10px;">COULEUR ACCENT</p>
            <input type="color" onchange="document.documentElement.style.setProperty('--blue', this.value)">
        </div>
    </div>

    <nav>
        <button class="sel" onclick="showP('home', this)"><span>🏠</span>ACCUEIL</button>
        <button onclick="showP('vault', this)"><span>🔐</span>CAVERNE</button>
        <button onclick="location.reload()"><span>🔄</span>RESET</button>
    </nav>

    <script>
        let pin = "", exp = "";
        function press(n) { if(n==='C') pin = ""; else if(pin.length < 4) pin += n; document.getElementById('pin-display').innerText = "*".repeat(pin.length); }
        function validatePin() { if(pin === "1575") document.getElementById('lock-screen').style.display = 'none'; else pin = ""; }
        function toggleS() { document.getElementById('side').classList.toggle('on'); }
        function showP(id, btn) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page')); document.getElementById(id).classList.add('active-page'); if(btn) { document.querySelectorAll('nav button').forEach(b => b.classList.remove('sel')); btn.classList.add('sel'); } }
        function k(v) { const s = document.getElementById('c-res'); if(v==='C'){exp=""; s.innerText="0";} else if(v==='='){try{exp=eval(exp); s.innerText=exp;}catch(e){s.innerText="Err";}} else {exp+=v; s.innerText=exp;} }
        function addMem() { const n = document.getElementById('new-mem').value; const r = document.getElementById('new-rel').value; if(n&&r){ const p = document.createElement('p'); p.style.cssText = "padding:10px; border-bottom:1px solid #222;"; p.innerHTML = `🛡️ ${n} (${r})`; document.getElementById('f-list').appendChild(p); } }
        function loadMedia(e) { const u = URL.createObjectURL(e.target.files[0]); document.getElementById('preview-box').style.display='block'; document.getElementById('w-frame').style.display='none'; const v = document.getElementById('v-player'); v.src=u; v.style.display='block'; v.play(); }
        function openIncognito() { document.getElementById('preview-box').style.display='block'; document.getElementById('v-player').style.display='none'; const f = document.getElementById('w-frame'); f.src="https://www.google.com/search?igu=1"; f.style.display='block'; }
        function cleanSystem() { document.getElementById('ram-stat').innerText = "NETTOYAGE..."; setTimeout(()=>document.getElementById('ram-stat').innerText="99.9% LIBRE", 1500); }
        function init() {
            setInterval(() => {
                const n = new Date();
                let h = n.getHours(); const m = n.getMinutes().toString().padStart(2, '0'); const s = n.getSeconds().toString().padStart(2, '0');
                const ampm = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12;
                document.getElementById('xl-time').innerText = `${h}:${m}:${s} ${ampm}`;
                document.getElementById('xl-date').innerText = n.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'}).toUpperCase();
            }, 1000);
        }
    </script>
</body>
</html>
