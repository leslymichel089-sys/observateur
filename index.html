<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L'OBSERVATEUR - NOYAU FAMILIAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #0c0e12; --card: #1a1e26; --blue: #7FDBFF; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { padding: 25px; text-align: center; border-bottom: 3px solid var(--gold); background: #0f1217; position: relative; }
        header h1 { font-size: 1.4em; letter-spacing: 5px; color: var(--gold); text-transform: uppercase; }

        .sidebar { position: fixed; top: 0; left: -100%; width: 85%; height: 100%; background: var(--card); border-right: 3px solid var(--gold); transition: 0.4s; z-index: 10000; padding: 20px; overflow-y: auto; }
        .sidebar.active { left: 0; }
        .side-tool { width: 100%; padding: 15px; background: #000; border: 1px solid var(--gold); color: #fff; margin-bottom: 10px; border-radius: 10px; cursor: pointer; text-align: left; font-weight: bold; }

        .dash { display: grid; grid-template-columns: 1fr 1fr; padding: 15px; background: rgba(0,0,0,0.8); border-bottom: 2px solid var(--gold); text-align: center; font-weight: 900; color: var(--blue); font-size: 0.8em; }
        
        .page { display: none; flex: 1; overflow-y: auto; padding: 20px; animation: fadeIn 0.4s ease; }
        .active-page { display: block; }
        .card { background: var(--card); border: 2px solid rgba(212,175,55,0.4); border-radius: 20px; padding: 20px; margin-bottom: 20px; text-align: center; }

        .btn-gold { background: var(--gold); color: #000; padding: 15px; border-radius: 30px; border: none; font-weight: 900; text-transform: uppercase; width: 100%; margin-top: 10px; box-shadow: 0 0 15px var(--gold); }

        nav { display: flex; background: #0f1217; border-top: 3px solid var(--gold); height: 100px; padding-bottom: env(safe-area-inset-bottom); }
        nav button { flex: 1; background: none; border: none; color: #555; font-size: 11px; font-weight: 900; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        nav button.active { color: var(--gold); }
        nav button span { font-size: 30px; margin-bottom: 5px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body onload="initFamilyButler()">

    <div id="sidebar" class="sidebar">
        <h2 style="color:var(--gold); border-bottom:2px solid var(--gold); padding-bottom:10px; margin-bottom:20px;">🏠 GESTION DU CLAN</h2>
        <button class="side-tool" style="background:var(--blue); color:#000;" onclick="startDemo()">🎙️ DÉMO PRÉSENTATION</button>
        <button class="side-tool" onclick="window.open('https://www.larousse.fr')">📖 DICTIONNAIRE</button>
        <button class="side-tool" onclick="window.open('https://fr.wikipedia.org')">🌐 ENCYCLOPÉDIE</button>
        <button class="side-tool" onclick="showP('vault'); toggleSide();">🔐 ACCÈS CAVERNE</button>
        <button class="btn-gold" onclick="toggleSide()">RETOUR</button>
    </div>

    <header>
        <button onclick="toggleSide()" style="position:absolute; left:20px; top:35px; background:none; border:none; color:var(--gold); font-size:30px;">☰</button>
        <h1>L'OBSERVATEUR</h1>
    </header>

    <div class="dash">
        <div id="d-date">-- --</div>
        <div id="d-temp">GREENSBORO: 22°C</div>
        <div id="d-time" style="grid-column: span 2; font-size:1.5em; color:var(--gold);">00:00</div>
    </div>

    <div id="home" class="page active-page">
        <div class="card">
            <h3 id="butler-status" style="color:var(--gold);">UNITÉ DE PRESTIGE</h3>
            <button onclick="startVocal()" style="width:110px; height:110px; border-radius:50%; background:var(--gold); border:5px solid #000; margin:25px; font-size:45px; box-shadow: 0 0 30px var(--gold);">🎙️</button>
            <p id="transcript" style="color:var(--blue); font-style:italic; font-weight:bold;"></p>
        </div>
        <div class="card" style="border-color:var(--blue);">
            <h4 style="color:var(--blue);">💡 CONSEIL DU JOUR</h4>
            <p id="daily-tip" style="font-size:0.85em; margin-top:10px;">Analyse de l'environnement Greensboro en cours...</p>
        </div>
    </div>

    <div id="vault" class="page">
        <div class="card">
            <h3 style="color:var(--gold);">🔐 ARCHIVES DU CLAN</h3>
            <p style="font-size:0.8em; color:var(--blue);">HISTORIQUE DES MISES À JOUR</p>
            <div id="logs" style="background:#000; padding:15px; border-radius:10px; font-size:0.75em; text-align:left; margin-top:10px;">
                [v3.1.0] : Mode Présentation Familiale activé.<br>
                [v3.0.0] : Intégration Greensboro & Outils réels.
            </div>
        </div>
    </div>

    <nav>
        <button class="active" id="btn-home" onclick="showP('home')"><span>🏠</span>Accueil</button>
        <button id="btn-vault" onclick="showP('vault')"><span>🔐</span>Caverne</button>
        <button onclick="location.reload()"><span>🔄</span>Reset</button>
    </nav>

    <script>
        function toggleSide() { document.getElementById('sidebar').classList.toggle('active'); }

        function speak(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'fr-FR'; u.rate = 0.9; u.pitch = 1;
            window.speechSynthesis.speak(u);
        }

        function initFamilyButler() {
            setTimeout(() => {
                speak("L'OBSERVATEUR est en ligne. Bonjour PDG Lesly. Le noyau familial est sécurisé à Greensboro.");
                document.getElementById('daily-tip').innerText = "Conseil : Profitez de la douceur de Greensboro pour une marche créative aujourd'hui.";
            }, 1000);
        }

        function startDemo() {
            toggleSide();
            speak("Bonjour à tous. Je suis L'OBSERVATEUR, le majordome numérique conçu par le PDG Lesly Michel. Je veille sur ce foyer, j'analyse Greensboro, et je suis prêt à répondre à vos besoins avec précision et élégance.");
        }

        function startVocal() {
            const Recognition = window.webkitSpeechRecognition || window.SpeechRecognition;
            const rec = new Recognition();
            rec.onresult = (e) => {
                const cmd = e.results[0][0].transcript.toLowerCase();
                document.getElementById('transcript').innerText = `"${cmd}"`;
                
                if(cmd.includes("ça va")) {
                    speak("Je suis au sommet de mes capacités, merci de votre sollicitude, Créateur Suprême.");
                } else if(cmd.includes("bonjour")) {
                    speak("Bonjour à vous. Comment puis-je vous aider dans votre empire aujourd'hui ?");
                } else {
                    speak("J'enregistre cette information. Elle sera traitée avec la plus haute priorité.");
                }
            };
            rec.start();
        }

        function showP(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active-page'));
            document.getElementById(p).classList.add('active-page');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + p).classList.add('active');
        }

        setInterval(() => {
            const n = new Date();
            document.getElementById('d-date').innerText = n.toLocaleDateString('fr-FR', {day:'numeric', month:'short'}).toUpperCase();
            document.getElementById('d-time').innerText = n.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
        }, 1000);
    </script>
</body>
</html>
