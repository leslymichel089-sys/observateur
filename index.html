<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L'OBSERVATEUR - NOYAU OMNISCIENT</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #0c0e12; --card: #1a1e26; --blue: #7FDBFF; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { padding: 25px; text-align: center; border-bottom: 2px solid var(--gold); background: #0f1217; position: relative; }
        header h1 { margin: 0; font-size: 1.4em; letter-spacing: 5px; color: var(--gold); }
        .creator-tag { color: var(--blue); font-size: 0.7em; font-weight: bold; margin-top: 5px; text-transform: uppercase; }

        .page { display: none; flex: 1; overflow-y: auto; padding: 25px; animation: fadeIn 0.3s ease; }
        .active-page { display: block; }
        .card { background: var(--card); border: 2px solid var(--gold); border-radius: 25px; padding: 30px; margin-bottom: 20px; text-align: center; }

        /* BOUTON MICROPHONE MAJEUR */
        .mic-btn { width: 120px; height: 120px; border-radius: 50%; background: var(--gold); border: 4px solid #000; font-size: 50px; cursor: pointer; margin: 20px auto; display: block; }
        .listening { background: #ff4d4d !important; animation: pulse 1s infinite; box-shadow: 0 0 40px #ff4d4d; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        #transcript { margin-top: 20px; font-weight: 900; color: var(--blue); font-size: 1.1em; min-height: 1.5em; text-transform: uppercase; }

        nav { display: flex; background: #0f1217; border-top: 3px solid var(--gold); height: 115px; }
        nav button { flex: 1; background: none; border: none; color: #555; font-size: 14px; font-weight: 900; }
        nav button.active { color: var(--gold); }
        nav button span { font-size: 35px; display: block; }
    </style>
</head>
<body>

    <header>
        <h1>L'OBSERVATEUR</h1>
        <div class="creator-tag">Lesly Michel [Créateur Suprême]</div>
    </header>

    <div id="home" class="page active-page">
        <div class="card">
            <h3 id="status">SYSTÈME PRÊT</h3>
            <button id="micBtn" class="mic-btn" onclick="startVocal()">🎙️</button>
            <div id="transcript">Appuyez pour parler au noyau</div>
        </div>
    </div>

    <div id="academy" class="page">
        <div class="card">
            <h3>📖 ENCYCLOPÉDIE</h3>
            <input type="text" id="wikiIn" style="width:100%; padding:20px; border-radius:15px; border:2px solid var(--blue); background:#000; color:#fff; font-size:18px;" placeholder="Posez votre question...">
            <button onclick="manualSearch()" style="width:100%; background:var(--gold); padding:20px; border:none; border-radius:15px; margin-top:15px; font-weight:900;">INTERROGER</button>
        </div>
    </div>

    <nav>
        <button class="active" onclick="showPage('home')"><span>🏠</span>Accueil</button>
        <button onclick="showPage('academy')"><span>📚</span>Savoir</button>
        <button onclick="location.reload()"><span>🔄</span>Reset</button>
    </nav>

    <script>
        let userLang = 'fr-FR';
        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const rec = new Recognition();
        rec.lang = userLang;

        function speak(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = userLang;
            u.rate = (userLang === 'ht-HT') ? 0.75 : 0.95;
            window.speechSynthesis.speak(u);
        }

        function processCommand(cmd) {
            const now = new Date();
            // LOGIQUE DE RÉPONSE IMMÉDIATE
            if (cmd.includes("heure")) {
                const time = now.toLocaleTimeString('fr-FR', {hour: '2-digit', minute: '2-digit'});
                speak(userLang === 'ht-HT' ? `Li fè ${time} nan Greensboro.` : `Il est exactement ${time}.`);
            } 
            else if (cmd.includes("haïti") || cmd.includes("ayiti")) {
                const resp = "La capitale d'Haïti est Port-au-Prince.";
                speak(userLang === 'ht-HT' ? "Chèf lye peyi Dayiti se Pòtoprens." : resp);
            }
            else if (cmd.includes("bangkok")) {
                speak("La capitale de la Thaïlande est Bangkok.");
            }
            else if (cmd.includes("kreyòl")) {
                userLang = 'ht-HT'; rec.lang = 'ht-HT';
                speak("Respe Créateur. Mwen pale kreyòl kounye a.");
            }
            else {
                speak(userLang === 'ht-HT' ? "Mwen tande ou, men m ap chache repons lan." : "J'ai entendu votre demande, Créateur.");
            }
        }

        function startVocal() {
            speak(""); // Wake up audio
            try { rec.start(); document.getElementById('micBtn').classList.add('listening'); } catch(e) { rec.stop(); }
        }

        rec.onresult = (e) => {
            const result = e.results[0][0].transcript.toLowerCase();
            document.getElementById('transcript').innerText = result;
            processCommand(result);
        };

        rec.onend = () => { document.getElementById('micBtn').classList.remove('listening'); };

        function manualSearch() {
            const q = document.getElementById('wikiIn').value.toLowerCase();
            processCommand(q);
        }

        function showPage(p) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active-page'));
            document.getElementById(p).classList.add('active-page');
        }
    </script>
</body>
</html>
