<!DOCTYPE html>
<html lang="ht">
<head>
    </head>
<body>
    <script>
        let uLang = 'fr-FR';

        function speak(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            
            if (uLang === 'ht-HT') {
                u.lang = 'fr-FR'; // On utilise la base FR mais avec un texte créole phonétisé pour éviter l'accent robotique US
                u.rate = 0.8;      // Plus lent pour que ce soit clair
                u.pitch = 0.9;     // Un peu plus grave pour plus de respect
            } else {
                u.lang = 'fr-FR';
                u.rate = 0.95;
            }
            window.speechSynthesis.speak(u);
        }

        function startGenese() {
            const name = document.getElementById('nameInput').value.trim();
            const hour = new Date().getHours();
            
            if (name.toLowerCase().includes("guerda")) {
                uLang = 'ht-HT';
                // Texte optimisé pour la synthèse vocale
                const greet = (hour >= 18 || hour < 5) ? "Bonswa" : "Bonjou";
                const msg = `${greet} Guerda. Mwen se L'OBSERVATEUR. Mwen kontan resevwa ou lakay ou. Al gade nan Kavèn nan, gen yon bèl trezò Lesly Michel kite pou ou.`;
                speak(msg);
                document.getElementById('guerdaMsg').style.display = 'block';
            } else {
                const greet = (hour >= 18 || hour < 5) ? "Bonsoir" : "Bonjour";
                speak(`${greet} ${name}. Je suis L'OBSERVATEUR. Prêt pour la mission.`);
            }
            document.getElementById('identifyScreen').style.display = 'none';
        }
    </script>
</body>
</html>
