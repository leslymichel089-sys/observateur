<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L'OBSERVATEUR - ULTIME</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main: #d4af37; --bg: #0c0e12; --card: #1a1e26; --accent: #7FDBFF; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background-color: var(--bg); background-size: cover; background-position: center; color: #fff; font-family: 'Montserrat', sans-serif; height: 100vh; width: 100vw; display: flex; flex-direction: column; overflow: hidden; }
        
        .plasma-ring { position: absolute; border-radius: 50%; border: 5px solid transparent; border-top-color: var(--accent); border-bottom-color: var(--main); animation: spin 1.5s linear infinite; box-shadow: 0 0 30px var(--accent); z-index: 1; pointer-events: none; }
        @keyframes spin { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

        header { padding: 20px; text-align: center; border-bottom: 3px solid var(--main); background: rgba(15, 18, 23, 0.9); position: relative; min-height: 90px; }
        header h1 { font-size: 1.2em; letter-spacing: 4px; color: var(--main); text-transform: uppercase; }

        .page { display: none; flex: 1; overflow-y: auto; padding: 20px; animation: fadeIn 0.4s ease; }
        .active-page { display: block; }
        .card { background: rgba(26, 30, 38, 0.9); border: 2px solid var(--main); border-radius: 20px; padding: 20px; margin-bottom: 15px; text-align: center; }

        .btn-gold { background: var(--main); color: #000; padding: 15px; border-radius: 30px; border: none; font-weight: 900; text-transform: uppercase; cursor: pointer; width: 100%; margin-top: 10px; }
        .input-supreme { width: 100%; padding: 15px; background: #000; color: var(--main); border: 2px solid var(--main); border-radius: 12px; margin-bottom: 10px; text-align: center; }

        /* NAVIGATEUR & MÉDIA */
        #webFrame { width: 100%; height: 300px; border: 2px solid var(--main); border-radius: 15px; margin-top: 10px; display: none; background: #fff; }

        nav { display: flex; background: #0f1217; border-top: 3px solid var(--main); height: 100px; }
        nav button { flex: 1; background: none; border: none; color: #555; font-size: 10px; font-weight: 900; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        nav button.active { color: var(--main); }
        nav button span { font-size: 28px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <div class="plasma-ring" style="width:100px; height:100px; top:50%; left:50%;"></div>
        <h1>L'OBSERVATEUR</h1>
    </header>

    <div id="home" class="page active-page">
        <div class="card">
            <h3 style="color:var(--main);">MULTIMÉDIA & WEB</h3>
            <input type="text" id="webUrl" class="input-supreme" placeholder="Lien Vidéo, Musique ou Site...">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button class="btn-gold" onclick="openWeb()">🌐 NAVIGUER</button>
                <button class="btn-gold" onclick="openMedia()">🎬 LECTURE</button>
            </div>
            <iframe id="webFrame"></iframe>
        </div>
    </div>

    <div id="vault" class="page">
        <div class="card">
            <h3 style="color:var(--main);">⚙️ CONFIGURATION</h3>
            <p style="font-size:0.8em; margin-bottom:10px;">CHANGER LE FOND D'ÉCRAN</p>
            <input type="file" id="bgUpload" accept="image/*" style="display:none;" onchange="changeBg(event)">
            <button class="btn-gold" onclick="document.getElementById('bgUpload').click()">🖼️ CHOISIR IMAGE</button>
            
            <p style="font-size:0.8em; margin-top:20px;">COULEUR SYSTÈME</p>
            <input type="color" onchange="document.documentElement.style.setProperty('--main', this.value)" style="width:100%; height:40px; border:none; background:none;">
        </div>
    </div>

    <nav>
        <button class="active" onclick="showPage('home')"><span>🏠</span>Accueil</button>
        <button onclick="showPage('vault')"><span>🔐</span>Paramètres</button>
        <button onclick="location.reload()"><span>🔄</span>Reload</button>
    </nav>

    <script>
        function openWeb() {
            let url = document.getElementById('webUrl').value;
            if(!url.startsWith('http')) url = 'https://www.google.com/search?q=' + url;
            const frame = document.getElementById('webFrame');
            frame.src = url;
            frame.style.display = 'block';
            window.speechSynthesis.speak(new SpeechSynthesisUtterance("Navigation incognito activée."));
        }

        function openMedia() {
            const url = document.getElementById('webUrl').value;
            if(url.includes('youtube') || url.includes('youtu.be')) {
                const videoId = url.split('v=')[1] || url.split('/').pop();
                document.getElementById('webFrame').src = `https://www.youtube.com/embed/${videoId}`;
                document.getElementById('webFrame').style.display = 'block';
            } else {
                alert("Collez un lien YouTube ou un fichier audio/vidéo.");
            }
        }

        function changeBg(event) {
            const reader = new FileReader();
            reader.onload = function(){
                document.body.style.backgroundImage = `url(${reader.result})`;
            };
            reader.readAsDataURL(event.target.files[0]);
        }

        function showPage(p) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active-page'));
            document.getElementById(p).classList.add('active-page');
        }
    </script>
</body>
</html>
