<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L'OBSERVATEUR - SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #050505; --card: #111; --blue: #00d4ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* ECRAN D'IDENTIFICATION OBLIGATOIRE */
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 20000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; }
        .input-box { width: 100%; max-width: 300px; padding: 15px; background: #111; border: 2px solid var(--gold); color: #fff; border-radius: 10px; margin: 10px 0; text-align: center; font-size: 1.1em; }
        .lang-select { display: flex; gap: 10px; margin-bottom: 20px; }
        .lang-btn { padding: 10px 20px; border: 1px solid var(--gold); background: none; color: var(--gold); border-radius: 5px; cursor: pointer; font-weight: bold; }
        .lang-btn.active { background: var(--gold); color: #000; }

        /* INTERFACE PRINCIPALE */
        .aura { height: 220px; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #1a1a1a 0%, #050505 100%); border-bottom: 2px solid var(--gold); position: relative; }
        .core-orb { width: 80px; height: 80px; background: var(--blue); border-radius: 50%; box-shadow: 0 0 40px var(--blue); z-index: 5; transition: 0.4s; }
        .core-orb.talk { animation: vibrate 0.3s infinite alternate; background: var(--gold); box-shadow: 0 0 60px var(--gold); }
        @keyframes vibrate { from { transform: scale(1); } to { transform: scale(1.2); } }

        header { padding: 15px; text-align: center; font-weight: 900; letter-spacing: 4px; color: var(--gold); border-bottom: 1px solid #222; text-transform: uppercase; }
        .page { display: none; flex: 1; overflow-y: auto; padding: 20px; }
        .active-page { display: block; }
        .card { background: var(--card); border: 1px solid #333; border-radius: 15px; padding: 20px; margin-bottom: 15px; text-align: center; }

        nav { display: flex; background: #000; border-top: 2px solid var(--gold); height: 85px; }
        nav button { flex: 1; background: none; border: none; color: #555; font-size: 10px; font-weight: 900; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        nav button.sel { color: var(--gold); }
        nav button span { font-size: 24px; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="color:var(--gold); margin-bottom:20px; letter-spacing:3px;">L'OBSERVATEUR</h1>
        <p id="welcome-txt" style="font-size:0.9em; line-height:1.6; color:#aaa; margin-bottom:20px; max-width:400px;"></p>
        <input type="text" id="user-name" class="input-box" placeholder="Votre prénom">
        <div class="lang-select">
            <button class="lang-btn active" id="btn-fr" onclick="setL('fr-FR')">FRANÇAIS</button>
            <button class="lang-btn" id="btn-ht" onclick="setL('ht-HT')">KREYÒL</button>
        </div>
        <button onclick="accessSystem()" style="background:var(--gold); border:none; padding:15px 40px; border-radius:30px; font-weight:900; cursor:pointer; width:100%; max-width:300px;">ACCÉDER AU NOYAU</button>
    </div>

    <div class="aura">
        <div id="orb" class="core-orb"></div>
    </div>

    <header>L'OBSERVATEUR</header>

    <div id="home" class="page active-page">
        <div class="card">
            <h3 id="user-greet" style="color:var(--gold); margin-bottom:15px;">SESSION ACTIVE</h3>
            <button onclick="startListen()" style="width:90px; height:90px; border-radius:50%; background:var(--gold); border:none; font-size:40px; box-shadow: 0 0 20px var(--gold);">🎙️</button>
            <p id="out" style="color:var(--blue); margin-top:15px; font-style:italic; font-weight:bold;"></p>
        </div>
    </div>

    <div id="vault" class="page">
        <div class="card">
            <h3 style="color:var(--gold);">🔐 CAVERNE</h3>
            <textarea id="note-area" style="width:100%; height:120px; background:#000; color:var(--blue); border:1px solid #333; padding:15px; margin-top:15px; border-radius:10px;"></textarea>
            <button onclick="saveNote()" style="width:100%; padding:15px; background:var(--gold); border:none; margin-top:10px; font-weight:bold; border-radius:10px;">ARCHIVER DANS LA MÉMOIRE</button>
        </div>
    </div>

    <nav>
        <button class="sel" id="nh" onclick="showP('home', this)"><span>🏠</span>ACCUEIL</button>
        <button id="nv" onclick="showP('vault', this)"><span>🔐</span>CAVERNE</button>
        <button onclick="location.reload()"><span>🔄</span>RESET</button>
    </nav>

    <script>
        let currentLang = 'fr-FR';
        let userName = "";

        const welcomeMsg = "Salut, je suis L'OBSERVATEUR, un majordome numérique créé par PDG Lesly Michel, je vous souhaite la bienvenue. D'abord veuillez vous identifier en me donnant simplement votre prénom et votre langue préférée afin que je puisse mémoriser vos préférences dans la base de données interne.";

        function setL(l) {
            currentLang = l;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(l === 'fr-FR' ? 'btn-fr' : 'btn-ht').classList.add('active');
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = currentLang; u.rate = 0.9;
            u.onstart = () => document.getElementById('orb').classList.add('talk');
            u.onend = () => document.getElementById('orb').classList.remove('talk');
            window.speechSynthesis.speak(u);
        }

        function accessSystem() {
            userName = document.getElementById('user-name').value.trim();
            if(!userName) { alert("Veuillez entrer un prénom."); return; }
            
            localStorage.setItem('obs_user', userName);
            localStorage.setItem('obs_lang', currentLang);
            
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('user-greet').innerText = "BIENVENUE, " + userName.toUpperCase();
            
            const greet = (currentLang === 'fr-FR') 
                ? `Parfait ${userName}, vos préférences sont enregistrées. Je suis prêt à vous servir.`
                : `Parfait ${userName}, preferans ou anrejistre. Mwen pare pou m sèvi ou.`;
            speak(greet);
        }

        function showP(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            document.querySelectorAll('nav button').forEach(nb => nb.classList.remove('sel'));
            btn.classList.add('sel');
        }

        function startListen() {
            const Rec = window.webkitSpeechRecognition || window.SpeechRecognition;
            if(!Rec) return;
            const r = new Rec(); r.lang = currentLang;
            r.onresult = (e) => {
                const t = e.results[0][0].transcript.toLowerCase();
                document.getElementById('out').innerText = `"${t}"`;
                
                if(t.includes("ça va") || t.includes("ki jan ou ye")) {
                    speak(currentLang === 'fr-FR' ? "Je fonctionne à pleine capacité pour vous." : "Mwen ap fonksyone byen pou ou.");
                } else {
                    speak(currentLang === 'fr-FR' ? "J'assimile votre demande et je l'ajoute à mes calculs." : "Mwen resevwa mesaj la, m ap mete l nan memwa mwen.");
                }
            };
            r.start();
        }

        function saveNote() { localStorage.setItem('obs_notes', document.getElementById('note-area').value); alert("Note archivée."); }

        window.onload = () => {
            document.getElementById('welcome-txt').innerText = welcomeMsg;
            document.getElementById('note-area').value = localStorage.getItem('obs_notes') || "";
            // Le majordome lit le message de bienvenue dès que l'utilisateur clique quelque part (contrainte navigateur)
            document.body.addEventListener('click', () => {
                if(document.getElementById('login-screen').style.display !== 'none') speak(welcomeMsg);
            }, {once: true});
        };
    </script>
</body>
</html>
