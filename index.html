<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L'OBSERVATEUR V4.2</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='black' stroke='%23d4af37' stroke-width='5'/><text x='50%25' y='55%25' text-anchor='middle' fill='%23d4af37' font-family='Arial' font-size='40' font-weight='900'>O</text></svg>">
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --gold: #d4af37; --bg: #000; --card: #111; --blue: #00d4ff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        header { padding: 25px; text-align: center; border-bottom: 2px solid var(--gold); background: #000; position: relative; }
        .date-xl { font-size: 1.3em; color: var(--gold); font-weight: 900; text-transform: uppercase; }
        .time-xl { font-size: 1.8em; color: var(--blue); font-weight: 900; margin-top: 5px; }

        .sidebar { position: fixed; top: 0; left: -100%; width: 85%; height: 100%; background: #000; border-right: 3px solid var(--gold); transition: 0.4s; z-index: 50000; padding: 30px; overflow-y: auto; }
        .sidebar.on { left: 0; }
        .side-btn { width: 100%; padding: 15px; background: #111; border: 1px solid var(--gold); color: #fff; margin-bottom: 10px; border-radius: 10px; cursor: pointer; text-align: left; font-weight: 900; }

        .page { display: none; flex: 1; overflow-y: auto; padding: 20px; }
        .active-page { display: block; }
        .card { background: var(--card); border: 1px solid #333; border-radius: 20px; padding: 20px; margin-bottom: 15px; text-align: center; }

        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid var(--gold); color: #fff; border-radius: 8px; margin-bottom: 10px; }
        
        nav { display: flex; background: #000; border-top: 2px solid var(--gold); height: 85px; padding-bottom: 10px; }
        nav button { flex: 1; background: none; border: none; color: #444; font-size: 11px; font-weight: 900; }
        nav button.sel { color: var(--gold); }
        
        #lock-screen { position: fixed; inset: 0; background: #000; z-index: 100000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
    </style>
</head>
<body onload="init()">

    <div id="lock-screen">
        <h1 style="color:var(--gold); margin-bottom:20px; letter-spacing:5px;">L'OBSERVATEUR</h1>
        <input type="password" id="pin" placeholder="CODE 1575" style="text-align:center; font-size:1.5em; letter-spacing:10px;">
        <button onclick="checkAccess()" style="background:var(--gold); padding:15px 40px; border-radius:30px; border:none; font-weight:900; width:100%; max-width:250px;">ACCÉDER</button>
    </div>

    <div id="side" class="sidebar">
        <h2 style="color:var(--gold); margin-bottom:20px; border-bottom:1px solid var(--gold);">UNITÉ DE CONTRÔLE</h2>
        <p style="font-size:0.8em; color:var(--blue); margin-bottom:5px;">LANGUE SYSTÈME</p>
        <select id="lang-sel" onchange="setLang()">
            <option value="fr-FR">Français</option>
            <option value="ht-HT">Kreyòl Ayisyen</option>
        </select>
        <button class="side-btn" onclick="showP('family'); toggleS();">👥 MEMBRES FAMILLE</button>
        <button class="side-btn" onclick="toggleS()" style="background:var(--gold); color:#000; text-align:center;">FERMER</button>
    </div>

    <header>
        <button onclick="toggleS()" style="position:absolute; left:20px; top:35px; background:none; border:none; color:var(--gold); font-size:30px;">☰</button>
        <div id="xl-date" class="date-xl">MARS 2026</div>
        <div id="xl-time" class="time-xl">00:00:00 AM</div>
    </header>

    <div id="home" class="page active-page">
        <div class="card">
            <h3 style="color:var(--gold);">BIENVENUE PDG LESLY</h3>
            <p style="margin-top:10px; font-style:italic; color:#888;">Système opérationnel à Greensboro, NC.</p>
        </div>
    </div>

    <div id="family" class="page">
        <div class="card">
            <h3 style="color:var(--gold); margin-bottom:15px;">UNITÉ FAMILIALE</h3>
            <div id="f-list" style="text-align:left; margin-bottom:20px;">
                <p style="padding:10px; border-bottom:1px solid #222;">🛡️ Guerda Michel (Épouse)</p>
                <p style="padding:10px; border-bottom:1px solid #222;">🛡️ Esterlande Belfond (Fille)</p>
            </div>
            <hr style="border:0; border-top:1px solid var(--gold); margin:15px 0;">
            <h4>AJOUTER UN MEMBRE</h4>
            <input type="text" id="new-mem" placeholder="Nom du membre">
            <input type="text" id="new-rel" placeholder="Relation (ex: Fils)">
            <button onclick="addMem()" style="width:100%; padding:12px; background:var(--blue); border:none; border-radius:8px; font-weight:900;">ENREGISTRER</button>
        </div>
    </div>

    <nav>
        <button class="sel" onclick="showP('home', this)">ACCUEIL</button>
        <button onclick="showP('family', this)">FAMILLE</button>
        <button onclick="location.reload()">RESET</button>
    </nav>

    <script>
        let uLang = "fr-FR";

        function checkAccess() {
            if(document.getElementById('pin').value === "1575") {
                document.getElementById('lock-screen').style.display = 'none';
            } else { alert("ACCÈS REFUSÉ"); }
        }

        function toggleS() { document.getElementById('side').classList.toggle('on'); }
        
        function showP(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            if(btn) { document.querySelectorAll('nav button').forEach(b => b.classList.remove('sel')); btn.classList.add('sel'); }
        }

        function setLang() { uLang = document.getElementById('lang-sel').value; alert("Langue mise à jour."); }

        function addMem() {
            const name = document.getElementById('new-mem').value;
            const rel = document.getElementById('new-rel').value;
            if(name && rel) {
                const p = document.createElement('p');
                p.style.cssText = "padding:10px; border-bottom:1px solid #222;";
                p.innerHTML = `🛡️ ${name} (${rel})`;
                document.getElementById('f-list').appendChild(p);
                document.getElementById('new-mem').value = "";
                document.getElementById('new-rel').value = "";
            }
        }

        function init() {
            setInterval(() => {
                const n = new Date();
                // FORMAT 12H (AM/PM)
                let h = n.getHours();
                const m = n.getMinutes().toString().padStart(2, '0');
                const s = n.getSeconds().toString().padStart(2, '0');
                const ampm = h >= 12 ? 'PM' : 'AM';
                h = h % 12;
                h = h ? h : 12; 
                document.getElementById('xl-time').innerText = `${h}:${m}:${s} ${ampm}`;
                document.getElementById('xl-date').innerText = n.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'}).toUpperCase();
            }, 1000);
        }
    </script>
</body>
</html>
