<div class="card" style="border-color: #ff4d4d;">
    <h3 style="color:#ff4d4d;">📡 RAPPORT DE SURVEILLANCE</h3>
    <p style="font-size:0.7em; margin-bottom:10px;">Cliquez pour copier le rapport d'erreur pour le Créateur.</p>
    <button class="btn-gold" style="background:#ff4d4d; color:#fff;" onclick="copyDiagnostic()">GÉNÉRER RAPPORT BUG</button>
</div>

<script>
    // MODULE DE DIAGNOSTIC POUR GEMINI
    function copyDiagnostic() {
        const report = {
            unite: "L'OBSERVATEUR v3.0",
            status: "Actif",
            langue: uLang,
            ecran: window.innerWidth + "x" + window.innerHeight,
            caverne: "Chargée",
            animaCoeur: "Active",
            date: new Date().toISOString()
        };
        const textReport = JSON.stringify(report, null, 2);
        navigator.clipboard.writeText(textReport);
        speak("Rapport de surveillance copié. Donnez-le à Gemini.");
    }
</script>
