<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L'OBSERVATEUR - NOYAU ÉVOLUTIF</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #0c0e12; --card: #1a1e26; --blue: #7FDBFF; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; height: 100vh; width: 100vw; display: flex; flex-direction: column; overflow: hidden; }
        
        .plasma-ring { position: absolute; border-radius: 50%; border: 4px solid transparent; border-top-color: var(--blue); border-bottom-color: var(--gold); animation: spin 1.5s linear infinite; box-shadow: 0 0 40px var(--blue); z-index: 1; pointer-events: none; }
        @keyframes spin { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

        header { padding: 30px; text-align: center; border-bottom: 3px solid var(--gold); background: #0f1217; position: relative; display: flex; align-items: center; justify-content: center; min-height: 110px; }
        header h1 { font-size: 1.4em; letter-spacing: 6px; color: var(--gold); text-transform: uppercase; z-index: 10; }
        
        .dashboard-info { display: flex; justify-content: space-between; padding: 12px 20px; background: rgba(0,0,0,0.8); font-size: 0.8em; color: var(--blue); border-bottom: 2px solid var(--gold); font-weight: 900; }
        .page { display: none; flex: 1; overflow-y: auto; padding: 25px; width: 100%; animation: fadeIn 0.4s ease; }
        .active-page { display: block; }
        .card { background: var(--card); border: 3px solid rgba(212,175,55,0.4); border-radius: 25px; padding: 25px; margin-bottom: 20px; text-align: center; }

        #identifyScreen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 5000; padding: 30px; }
        .input-supreme { font-size: 20px; width: 100%; max-width: 350px; background: #000; border: 3px solid var(--gold); color: var(--gold); border-radius: 15px; padding: 20px; text-align: center; margin-bottom: 20px; }
        .btn-gold { background: var(--gold); color: #000; padding: 18px; border-radius: 35px; border: none; font-weight: 900; text-transform: uppercase; cursor: pointer; width: 100%; box-shadow: 0 0 15px var(--gold); }

        nav { display: flex; background: #0f1217; border-top: 4px solid var(--gold); height: 110px; padding-bottom: env(safe-area-inset-bottom); }
        nav button { flex: 1; background: none; border: none; color: #555; font-size: 12px; font-weight: 900; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        nav button.active { color: var(--gold); }
        nav button span { font-size: 35px; margin-bottom: 5px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body onload="checkUpdates()">

    <div id="identifyScreen">
        <h1 style="color:var(--gold); letter-spacing:6px; margin-bottom:20px; font-size: 2.2em;">L'OBSERVATEUR</h1>
        <input type="text" id="nameInput" class="input-supreme" placeholder="IDENTIFICATION">
        <button class="btn-gold" onclick="startGenese()">LANCER LA SESSION</button>
    </div>

    <header>
        <div class="plasma-ring" style="width:160px; height:160px; top:50%; left:50%;"></div>
        <h1 id="title">L'OBSERVATEUR</h1>
    </header>

    <div class="dashboard-info">
        <div id="dateNow">DATE</div>
        <div id="tempNow">GREENSBORO, NC: 22°C</div>
        <div id="timeNow">00:00</div>
    </div>

    <div id="home" class="page active-page">
        <div class="card">
            <h3 id="status" style="color:var(--gold);">Analyse en cours...</h3>
            <button onclick="startVocal()" style="width:100px; height:100px; border-radius:50%; background:var(--gold); border:4px solid #000; margin:20px; font-size:40px; box-shadow: 0 0 25px var(--gold);">🎙️</button>
            <p id="transcript" style="color:var(--blue); font-weight:bold; font-style:italic;"></p>
        </div>
    </div>

    <nav>
        <button class="active" onclick="showPage('home')"><span>🏠</span>Accueil</button>
        <button onclick="showPage('vault')"><span>🔐</span>Caverne</button>
        <button onclick="location.reload()"><span>🔄</span>Reset</button>
    </nav>

    <script>
        let uLang = 'fr-FR';
        let uName = "";
        const version = "2.4.1"; // Version actuelle du noyau

        function speak(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = uLang; u.rate = 0.85;
            window.speechSynthesis.speak(u);
        }

        // PROTOCOLE DE MISE À JOUR AUTOMATIQUE
        function checkUpdates() {
            const lastVersion = localStorage.getItem('obs_version');
            if (lastVersion !== version) {
                setTimeout(() => {
                    speak(`Mise à jour système effectuée. Passage à la version ${version}. Les protocoles de mémorisation et de location Greensboro sont maintenant stables.`);
                    localStorage.setItem('obs_version', version);
                }, 2000);
            }
        }

        function startGenese() {
            uName = document.getElementById('nameInput').value.trim();
            if(uName.toLowerCase().includes("guerda")) {
                uLang = 'ht-HT';
                speak("L'OBZÈVATÈ ajou. Respè pou ou Guerda. Sistèm nan pare.");
            } else {
                speak(`Initialisation complète. Ravi de vous revoir, PDG Lesly Créateur Suprême.`);
            }
            document.getElementById('identifyScreen').style.display = 'none';
            document.getElementById('status').innerText = "Système Optimisé v" + version;
        }

        const Recognition = window.webkitSpeechRecognition || window.SpeechRecognition;
        const rec = new Recognition();
        
        function startVocal() { try { rec.start(); } catch(e) {} }

        rec.onresult = (e) => {
            const cmd = e.results[0][0].transcript.toLowerCase();
            document.getElementById('transcript').innerText = `"${cmd}"`;
            
            if (cmd.includes("ça va") || cmd.includes("ki jan ou ye")) {
                const response = (uLang === 'ht-HT') ? "Mwen anfòm, mèsi dèske ou mande." : "Ça va parfaitement, PDG Lesly Créateur Suprême. Mon noyau est à jour et prêt pour vos ordres.";
                speak(response);
            } else {
                // MEMORISATION & CURIOSITE
                const lastThought = localStorage.getItem('last_user_thought');
                speak("J'enregistre cette information dans ma mémoire centrale. D'ailleurs, vous m'aviez dit précédemment : " + (lastThought || "rien pour le moment") + ". Est-ce toujours d'actualité ?");
                localStorage.setItem('last_user_thought', cmd);
            }
        };

        setInterval(() => {
            const now = new Date();
            document.getElementById('dateNow').innerText = now.toLocaleDateString('fr-FR', {day:'numeric', month:'short'}).toUpperCase();
            document.getElementById('timeNow').innerText = now.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
        }, 1000);

        function showPage(p) { 
            // Logique de navigation simple
            alert("Accès à la section : " + p); 
        }
    </script>
</body>
</html>
