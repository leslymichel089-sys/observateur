<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'OBSERVATEUR - PDG Lesly Michel</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --main-color: #00f2ff; --bg-dark: #050505; --accent: #ff0055; }
        body { background: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; user-select: none; -webkit-user-select: none; }
        
        #lock-screen { position: fixed; inset: 0; background: black; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; border: 2px solid var(--main-color); }
        input { background: #111; border: 1px solid var(--main-color); color: var(--main-color); padding: 15px; border-radius: 8px; text-align: center; font-size: 1.5rem; width: 220px; margin-bottom: 15px; outline: none; }
        
        #app { display: none; padding: 20px; flex-direction: column; align-items: center; text-align: center; height: 100%; justify-content: space-between; }
        
        #visualizer { height: 80px; display: flex; align-items: center; justify-content: center; gap: 8px; margin: 20px 0; }
        .bar { width: 6px; height: 15px; background: var(--main-color); border-radius: 10px; transition: 0.1s; }
        .active .bar { animation: pulse 0.6s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { height: 15px; opacity: 0.4; } 50% { height: 80px; opacity: 1; box-shadow: 0 0 20px var(--main-color); } }

        .btn { cursor: pointer; background: rgba(0, 242, 255, 0.05); border: 1px solid var(--main-color); color: var(--main-color); padding: 18px; width: 280px; border-radius: 5px; font-weight: bold; transition: 0.3s; letter-spacing: 2px; margin: 10px; text-transform: uppercase; }
        .btn:active { background: var(--main-color); color: black; }
        
        #status { font-family: 'Courier New', monospace; font-size: 0.9rem; color: #888; height: 40px; }
        #footer { margin-bottom: 10px; font-size: 0.7rem; color: #444; border-top: 1px solid #222; width: 100%; padding-top: 10px; }
        select { background: black; color: var(--main-color); border: 1px solid #333; padding: 10px; width: 150px; border-radius: 5px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="lock-screen">
        <h1 style="color:var(--main-color); letter-spacing: 8px;">L'OBSERVATEUR</h1>
        <p style="font-size: 0.8rem;">UNITÉ AUTONOME : PDG LESLY MICHEL</p>
        <input type="password" id="pin" placeholder="CODE" maxlength="4">
        <button class="btn" onclick="verifyIdentity()">DÉVERROUILLER</button>
    </div>

    <div id="app">
        <div style="margin-top: 40px;">
            <select id="lang-select" onchange="savePrefs()">
                <option value="fr-FR">Français</option>
                <option value="ht-HT">Kreyòl</option>
                <option value="en-US">English</option>
                <option value="es-ES">Español</option>
                <option value="pt-PT">Português</option>
            </select>
            <h2 id="creator-tag">SYSTEM ONLINE</h2>
            <p id="welcome-msg" style="color: var(--main-color);">UNITÉ SOUS CONTRÔLE DE LESLY MICHEL</p>
        </div>
        
        <div id="visualizer">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>

        <div id="status">SYSTÈME PRÊT</div>
        
        <div id="controls">
            <button class="btn" onclick="startLogic()">🎙 COMMANDE VOCALE</button>
            <button class="btn" style="font-size: 0.7rem; border-color: #333;" onclick="window.location.href='https://github.com/'">⚙️ PROGRAMMATION GITHUB</button>
        </div>

        <div id="footer">
            © 2026 PDG LESLY MICHEL. MÉMOIRE LOCALE ACTIVÉE.
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        window.onload = () => {
            const savedLang = localStorage.getItem('obs_lang');
            if(savedLang) document.getElementById('lang-select').value = savedLang;
        };

        function savePrefs() {
            localStorage.setItem('obs_lang', document.getElementById('lang-select').value);
        }

        function playClick() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function verifyIdentity() {
            playClick();
            if (document.getElementById('pin').value === "0000") {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                speak("Système déverrouillé. Bonjour PDG Lesly Michel.");
            } else {
                alert("ERREUR D'AUTHENTIFICATION.");
            }
        }

        function speak(text) {
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = document.getElementById('lang-select').value;
            utter.onstart = () => document.getElementById('visualizer').classList.add('active');
            utter.onend = () => document.getElementById('visualizer').classList.remove('active');
            synth.speak(utter);
        }

        function startLogic() {
            playClick();
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            const lang = document.getElementById('lang-select').value;
            recognition.lang = lang;

            recognition.onstart = () => {
                document.getElementById('status').innerText = "UNITÉ EN ÉCOUTE...";
                document.getElementById('visualizer').classList.add('active');
            };

            recognition.onresult = (event) => {
                const cmd = event.results[0][0].transcript;
                document.getElementById('status').innerText = "> " + cmd;
                localStorage.setItem('last_cmd', cmd);
                
                let response = "Ordre enregistré, Monsieur le PDG.";
                if(lang === "ht-HT") response = "Lòd anrejistre, PDG Lesly Michel.";
                if(lang === "en-US") response = "Order received, CEO Lesly Michel.";
                
                speak(response);
            };
            recognition.start();
        }
    </script>
</body>
</html>
