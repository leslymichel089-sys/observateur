<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L'OBSERVATEUR - NOYAU FINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main: #d4af37; --bg: #0c0e12; --card: #1a1e26; --accent: #7FDBFF; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background-color: var(--bg); background-size: cover; background-position: center; color: #fff; font-family: 'Montserrat', sans-serif; height: 100vh; width: 100vw; display: flex; flex-direction: column; overflow: hidden; }
        
        .plasma-ring { position: absolute; border-radius: 50%; border: 5px solid transparent; border-top-color: var(--accent); border-bottom-color: var(--main); animation: spin 1.5s linear infinite; box-shadow: 0 0 30px var(--accent); z-index: 1; pointer-events: none; }
        @keyframes spin { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

        header { padding: 25px; text-align: center; border-bottom: 3px solid var(--main); background: rgba(15, 18, 23, 0.95); position: relative; min-height: 100px; cursor: pointer; }
        header h1 { font-size: 1.3em; letter-spacing: 5px; color: var(--main); text-transform: uppercase; user-select: none; }

        .page { display: none; flex: 1; overflow-y: auto; padding: 20px; animation: fadeIn 0.4s ease; }
        .active-page { display: block; }
        .card { background: rgba(26, 30, 38, 0.9); border: 2px solid var(--main); border-radius: 20px; padding: 20px; margin-bottom: 15px; text-align: center; box-shadow: 0 10px 30px #000; }

        .btn-gold { background: var(--main); color: #000; padding: 18px; border-radius: 35px; border: none; font-weight: 900; text-transform: uppercase; cursor: pointer; width: 100%; margin-top: 10px; font-size: 0.9em; }
        .input-supreme { width: 100%; padding: 18px; background: #000; color: var(--main); border: 2px solid var(--main); border-radius: 15px; margin-bottom: 15px; text-align: center; font-size: 1.1em; }

        #webFrame, #localPlayer { width: 100%; height: 350px; border: 2px solid var(--main); border-radius: 15px; margin-top: 15px; display: none; background: #000; }

        #identifyScreen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 5000; padding: 30px; }

        nav { display: flex; background: #0f1217; border-top: 3px solid var(--main); height: 110px; padding-bottom: env(safe-area-inset-bottom); }
        nav button { flex: 1; background: none; border: none; color: #555; font-size: 11px; font-weight: 900; display: flex; flex-direction: column; align-items: center; justify-content: center; text-transform: uppercase; }
        nav button.active { color: var(--main); }
        nav button span { font-size: 32px; margin-bottom: 5px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="identifyScreen">
        <h1 style="color:var(--main); letter-spacing:6px; margin-bottom:30px; font-size: 2.2em;">L'OBSERVATEUR</h1>
        <input type="text" id="nameInput" class="input-supreme" placeholder="VOTRE NOM">
        <button class="btn-gold" onclick="startGenese()">ACTIVER</button>
    </div>

    <header onclick="handleHeaderClick()">
        <div class="plasma-ring" style="width:120px; height:120px; top:50%; left:50%;"></div>
        <h1 id="mainTitle">L'OBSERVATEUR</h1>
    </header>

    <div id="home" class="page active-page">
        <div class="card">
            <h3 id="welcomeMsg" style="color:var(--main);">NOYAU ACTIF</h3>
            <input type="text" id="webUrl" class="input-supreme" placeholder="Lien ou Recherche...">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button class="btn-gold" onclick="openWeb()">🌐 WEB</button>
                <button class="btn-gold" onclick="openMedia()">🎬 YOUTUBE</button>
            </div>
            <input type="file" id="mediaUpload" accept="video/*,audio/*" style="display:none;" onchange="loadLocalMedia(event)">
            <button class="btn-gold" style="background:var(--accent);" onclick="document.getElementById('mediaUpload').click()">📂 GALERIE</button>
            <iframe id="webFrame"></iframe>
            <video id="localPlayer" controls></video>
        </div>
    </div>

    <div id="vault" class="page">
        <div class="card">
            <h3 style="color:var(--main);">🔐 LA CAVERNE</h3>
            <div id="guerdaMsg" style="display:none; text-align:left; border-left:4px solid var(--main); padding-left:15px; font-style:italic; line-height:1.6;">
                "Chè Guerda, byenveni. Ou se poto mitan fanmi an."
            </div>
            <input type="file" id="bgUpload" accept="image/*" style="display:none;" onchange="changeBg(event)">
            <button class="btn-gold" onclick="document.getElementById('bgUpload').click()">🖼️ CHANGER FOND</button>
        </div>
    </div>

    <nav>
        <button class="active" onclick="showPage('home')"><span>🏠</span>Accueil</button>
        <button onclick="showPage('vault')"><span>🔐</span>Caverne</button>
        <button onclick="location.reload()"><span>🔄</span>Reset</button>
    </nav>

    <script>
        let uLang = 'fr-FR';
        let clickCount = 0;
        let lastClickTime = 0;

        function speak(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = uLang; u.rate = 0.85;
            window.speechSynthesis.speak(u);
        }

        function startGenese() {
            const name = document.getElementById('nameInput').value.trim();
            if(name.toLowerCase().includes("guerda")) {
                uLang = 'ht-HT';
                speak("Mwen se L'OBSERVATEUR. Bonjou Guerda. Gen yon trezò pou ou nan Kavèn nan.");
                document.getElementById('guerdaMsg').style.display = 'block';
            } else {
                speak(`Bonjour ${name}. Unité prête.`);
            }
            document.getElementById('identifyScreen').style.display = 'none';
            document.getElementById('welcomeMsg').innerText = "BIENVENUE, " + name.toUpperCase();
        }

        function handleHeaderClick() {
            const now = Date.now();
            if (now - lastClickTime < 500) clickCount++; else clickCount = 1;
            lastClickTime = now;
            if (clickCount === 3) {
                document.getElementById('webFrame').src = "";
                document.getElementById('localPlayer').pause();
                document.getElementById('webFrame').style.display = 'none';
                document.getElementById('localPlayer').style.display = 'none';
                showPage('home');
                speak("Sécurité activée.");
            }
        }

        function loadLocalMedia(e) {
            const file = e.target.files[0];
            const url = URL.createObjectURL(file);
            const p = document.getElementById('localPlayer');
            p.src = url; p.style.display = 'block';
            document.getElementById('webFrame').style.display = 'none';
            p.play();
        }

        function openWeb() {
            let url = document.getElementById('webUrl').value;
            if(!url.startsWith('http')) url = 'https://www.google.com/search?q=' + url;
            document.getElementById('webFrame').src = url;
            document.getElementById('webFrame').style.display = 'block';
        }

        function openMedia() {
            const url = document.getElementById('webUrl').value;
            if(url.includes('youtube')) {
                const id = url.split('v=')[1]?.split('&')[0] || url.split('/').pop();
                document.getElementById('webFrame').src = `https://www.youtube.com/embed/${id}?autoplay=1`;
                document.getElementById('webFrame').style.display = 'block';
            }
        }

        function changeBg(e) {
            const r = new FileReader();
            r.onload = () => document.body.style.backgroundImage = `url(${r.result})`;
            r.readAsDataURL(e.target.files[0]);
        }

        function showPage(p) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active-page'));
            document.getElementById(p).classList.add('active-page');
        }
    </script>
</body>
</html>
