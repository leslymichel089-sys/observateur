<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAXIMUS-1975 AI-TECH</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050810;
    --bg2: #080d1a;
    --panel: #0b1020;
    --border: #1a2a4a;
    --accent: #00d4ff;
    --accent2: #ff6b00;
    --accent3: #00ff88;
    --text: #c8d8f0;
    --muted: #4a6080;
    --user-bubble: #0d2040;
    --ai-bubble: #0a1830;
    --glow: 0 0 20px rgba(0,212,255,0.3);
    --glow2: 0 0 20px rgba(255,107,0,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 20s linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes gridMove {
    0% { background-position: 0 0; }
    100% { background-position: 40px 40px; }
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  header {
    position: relative;
    z-index: 10;
    background: linear-gradient(180deg, #060c1a 0%, transparent 100%);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    flex-shrink: 0;
  }

  .header-inner {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }

  .logo-group {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 40px;
    height: 40px;
    position: relative;
    flex-shrink: 0;
  }

  .logo-icon svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 8px var(--accent));
  }

  .logo-text {
    display: flex;
    flex-direction: column;
  }

  .logo-main {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: clamp(14px, 3vw, 20px);
    color: var(--accent);
    letter-spacing: 2px;
    text-shadow: 0 0 15px rgba(0,212,255,0.6);
    line-height: 1;
  }

  .logo-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--accent2);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent3);
    box-shadow: 0 0 8px var(--accent3);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .lang-selector {
    display: flex;
    gap: 4px;
  }

  .lang-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 4px 8px;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 2px;
    letter-spacing: 1px;
  }

  .lang-btn.active, .lang-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,212,255,0.08);
    box-shadow: var(--glow);
  }

  .app-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    max-width: 900px;
    width: 100%;
    margin: 0 auto;
    padding: 0 16px;
    position: relative;
    z-index: 1;
    overflow: hidden;
  }

  .system-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin: 12px 0 8px;
    overflow: hidden;
    transition: all 0.3s;
    flex-shrink: 0;
  }

  .system-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    cursor: pointer;
    user-select: none;
  }

  .system-panel-header span {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--accent2);
    letter-spacing: 2px;
  }

  .panel-toggle {
    font-size: 10px;
    color: var(--muted);
    transition: transform 0.3s;
  }

  .system-panel.open .panel-toggle { transform: rotate(180deg); }

  .system-panel-body {
    display: none;
    padding: 8px 12px 12px;
    border-top: 1px solid var(--border);
  }

  .system-panel.open .system-panel-body { display: block; }

  .system-prompt-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .system-prompt-input {
    width: 100%;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    padding: 8px;
    resize: vertical;
    min-height: 60px;
    border-radius: 2px;
    outline: none;
    transition: border-color 0.2s;
  }

  .system-prompt-input:focus {
    border-color: var(--accent2);
  }

  .messages-area {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  .messages-area::-webkit-scrollbar { width: 4px; }
  .messages-area::-webkit-scrollbar-track { background: transparent; }
  .messages-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .welcome-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 40px 20px;
    text-align: center;
    flex: 1;
  }

  .welcome-hexagon {
    width: 80px; height: 80px;
    position: relative;
    animation: rotateSlow 10s linear infinite;
  }

  @keyframes rotateSlow {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .welcome-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(22px, 5vw, 36px);
    font-weight: 900;
    color: var(--accent);
    text-shadow: 0 0 30px rgba(0,212,255,0.5);
    letter-spacing: 3px;
  }

  .welcome-subtitle {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--accent2);
    letter-spacing: 4px;
  }

  .welcome-desc {
    font-size: 14px;
    color: var(--muted);
    max-width: 400px;
    line-height: 1.6;
  }

  .quick-prompts {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    max-width: 500px;
  }

  .quick-btn {
    background: rgba(0,212,255,0.05);
    border: 1px solid rgba(0,212,255,0.2);
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 6px 12px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    letter-spacing: 1px;
  }

  .quick-btn:hover {
    background: rgba(0,212,255,0.12);
    border-color: var(--accent);
    box-shadow: var(--glow);
  }

  .message {
    display: flex;
    gap: 10px;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 32px; height: 32px;
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .message.user .msg-avatar {
    background: rgba(255,107,0,0.15);
    border: 1px solid rgba(255,107,0,0.4);
    color: var(--accent2);
  }

  .message.ai .msg-avatar {
    background: rgba(0,212,255,0.1);
    border: 1px solid rgba(0,212,255,0.3);
    color: var(--accent);
  }

  .msg-content {
    flex: 1;
    max-width: calc(100% - 42px);
  }

  .msg-meta {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 4px;
    letter-spacing: 1px;
  }

  .message.user .msg-meta { text-align: right; }

  .msg-bubble {
    padding: 12px 16px;
    border-radius: 2px;
    line-height: 1.6;
    font-size: 14px;
    position: relative;
    word-break: break-word;
  }

  .message.user .msg-bubble {
    background: var(--user-bubble);
    border: 1px solid rgba(255,107,0,0.25);
    border-radius: 2px 2px 0 2px;
  }

  .message.ai .msg-bubble {
    background: var(--ai-bubble);
    border: 1px solid rgba(0,212,255,0.2);
    border-radius: 2px 2px 2px 0;
  }

  .message.ai .msg-bubble::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 2px; height: 100%;
    background: linear-gradient(180deg, var(--accent), transparent);
    border-radius: 2px 0 0 2px;
  }

  .typing-indicator {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 14px 16px;
  }

  .typing-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: typingBounce 1.2s ease-in-out infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  .input-area {
    flex-shrink: 0;
    padding: 12px 0 16px;
    border-top: 1px solid var(--border);
    background: linear-gradient(0deg, var(--bg) 0%, transparent 100%);
  }

  .input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px;
    transition: border-color 0.2s;
  }

  .input-row:focus-within {
    border-color: rgba(0,212,255,0.4);
    box-shadow: var(--glow);
  }

  .msg-input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    font-size: 14px;
    resize: none;
    outline: none;
    min-height: 22px;
    max-height: 120px;
    line-height: 1.5;
    padding: 2px 0;
  }

  .msg-input::placeholder {
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
  }

  .send-btn {
    background: linear-gradient(135deg, var(--accent) 0%, #0090cc 100%);
    border: none;
    color: var(--bg);
    width: 36px; height: 36px;
    border-radius: 2px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    font-size: 16px;
  }

  .send-btn:hover {
    transform: scale(1.05);
    box-shadow: var(--glow);
  }

  .send-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  .input-hint {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    margin-top: 8px;
    letter-spacing: 1px;
  }

  .clear-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    padding: 4px 8px;
    cursor: pointer;
    border-radius: 2px;
    letter-spacing: 1px;
    transition: all 0.2s;
    flex-shrink: 0;
    height: 36px;
  }

  .clear-btn:hover {
    border-color: rgba(255,60,60,0.5);
    color: rgba(255,60,60,0.8);
    background: rgba(255,60,60,0.05);
  }

  .error-msg {
    background: rgba(255,60,60,0.08);
    border: 1px solid rgba(255,60,60,0.3);
    color: rgba(255,120,120,0.9);
    padding: 10px 14px;
    border-radius: 2px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
  }

  .corner-deco {
    position: fixed;
    width: 60px; height: 60px;
    pointer-events: none;
    z-index: 5;
    opacity: 0.4;
  }

  .corner-deco.tl { top: 70px; left: 0; border-top: 1px solid var(--accent); border-left: 1px solid var(--accent); }
  .corner-deco.tr { top: 70px; right: 0; border-top: 1px solid var(--accent); border-right: 1px solid var(--accent); }
  .corner-deco.bl { bottom: 0; left: 0; border-bottom: 1px solid var(--accent); border-left: 1px solid var(--accent); }
  .corner-deco.br { bottom: 0; right: 0; border-bottom: 1px solid var(--accent); border-right: 1px solid var(--accent); }

  @media (max-width: 480px) {
    .status-bar .status-text { display: none; }
    .logo-sub { display: none; }
  }
</style>
</head>

<header>

          <polygon points="40,14 66,28 66,52 40,66 14,52 14,28" stroke="#00d4ff" stroke-width="0.8" fill="rgba(0,212,255,0.03)" opacity="0.7"/>

          <text x="40" y="44" text-anchor="middle" fill="#00d4ff" font-family="Orbitron" font-size="9" font-weight="900">AI</text>
        </svg>
      </div>
      <div class="welcome-title">MAXIMUS-1975</div>
      <div class="welcome-subtitle">AI-TECH INTELLIGENCE SYSTEM</div>
      <div class="welcome-desc" id="welcomeDesc"></div>
      <div class="quick-prompts" id="quickPrompts"></div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea
        class="msg-input"
        id="msgInput"
        rows="1"
        placeholder="Écrivez un message... / Type a message... / Ekri yon mesaj..."
        onkeydown="handleKey(event)"

    <div class="input-hint" id="inputHint">ENTRÉE = Envoyer &nbsp;|&nbsp; SHIFT+ENTRÉE = Nouvelle ligne</div>
  </div>
</div>

const ANTHROPIC_API_KEY = "sk-ant-votre-cle-ici"; // ← REMPLACE PAR TA VRAIE CLÉ ANTHROPIC (sk-ant-...)

function getSystemPrompt() {
  const custom = document.getElementById('systemPrompt').value.trim();
  const base = `Tu es MAXIMUS-1975, un assistant IA multilingue ultra-avancé créé avec la technologie AI-TECH. 
Tu parles couramment le français, l'anglais et le créole haïtien.

Ton identité : MAXIMUS-1975 AI-TECH System.`;
  return custom ? `\( {base}\n\nINSTRUCTIONS SUPPLÉMENTAIRES:\n \){custom}` : base;
}

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + lang).classList.add('active');
  
  const t = i18n[lang];
  document.getElementById('msgInput').placeholder = t.placeholder;
  document.getElementById('inputHint').innerHTML = t.hint;
  document.getElementById('welcomeDesc').innerHTML = t.welcome;
  document.getElementById('systemPanel').querySelector('.system-prompt-label').textContent = t.systemLabel;
  
  const qp = document.getElementById('quickPrompts');
  qp.innerHTML = t.prompts.map(p => 
    `<button class="quick-btn" onclick="sendQuick('\( {p.replace(/'/g,"\\'")}')"> \){p}</button>`
  ).join('');
}

function togglePanel() {
  document.getElementById('systemPanel').classList.toggle('open');
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function sendQuick(text) {
  document.getElementById('msgInput').value = text;
  sendMessage();
}

function clearChat() {
  conversationHistory = [];
  const area = document.getElementById('messagesArea');
  area.innerHTML = `
    <div class="welcome-screen" id="welcomeScreen">
      <div class="welcome-hexagon">
        <svg viewBox="0 0 80 80" fill="none">
          <polygon points="40,4 76,22 76,58 40,76 4,58 4,22" stroke="#00d4ff" stroke-width="1.5" fill="rgba(0,212,255,0.04)"/>
          <polygon points="40,14 66,28 66,52 40,66 14,52 14,28" stroke="#00d4ff" stroke-width="0.8" fill="rgba(0,212,255,0.03)" opacity="0.7"/>
          <circle cx="40" cy="40" r="10" fill="rgba(0,212,255,0.15)" stroke="#00d4ff" stroke-width="1.5"/>
          <text x="40" y="44" text-anchor="middle" fill="#00d4ff" font-family="Orbitron" font-size="9" font-weight="900">AI</text>
        </svg>
      </div>
      <div class="welcome-title">MAXIMUS-1975</div>
      <div class="welcome-subtitle">AI-TECH INTELLIGENCE SYSTEM</div>
      <div class="welcome-desc" id="welcomeDesc">${i18n[currentLang].welcome}</div>
      <div class="quick-prompts" id="quickPrompts">
        \( {i18n[currentLang].prompts.map(p => `<button class="quick-btn" onclick="sendQuick(' \){p.replace(/'/g,"\\'")}')">${p}</button>`).join('')}
      </div>
    </div>`;
}

function hideWelcome() {
  const ws = document.getElementById('welcomeScreen');
  if (ws) ws.remove();
}

function addMessage(role, text) {
  hideWelcome();
  const area = document.getElementById('messagesArea');
  const t = i18n[currentLang];
  const isUser = role === 'user';
  
  const time = new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
  
  const div = document.createElement('div');
  div.className = `message ${isUser ? 'user' : 'ai'}`;
  div.innerHTML = `
    <div class="msg-avatar">${isUser ? t.you.substring(0,2) : 'MX'}</div>
    <div class="msg-content">
      <div class="msg-meta">${isUser ? t.you : t.ai} • ${time}</div>
      <div class="msg-bubble">${text.replace(/\n/g, '<br>')}</div>
    </div>`;
  
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function addTyping() {
  hideWelcome();
  const area = document.getElementById('messagesArea');
  const div = document.createElement('div');
  div.className = 'message ai';
  div.id = 'typingIndicator';
  div.innerHTML = `
    <div class="msg-avatar">MX</div>
    <div class="msg-content">
      <div class="msg-meta">${i18n[currentLang].ai} • ${i18n[currentLang].thinking}</div>
      <div class="msg-bubble">
        <div class="typing-indicator">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>
    </div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typingIndicator');
  if (t) t.remove();
}

async function sendMessage() {
  if (isProcessing) return;
  
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  
  isProcessing = true;
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;
  
  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });
  
  addTyping();
  
  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': ANTHROPIC_API_KEY,
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-3-5-sonnet-20241022',
        max_tokens: 1000,
        system: getSystemPrompt(),
        messages: conversationHistory
      })
    });
    
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    
    const data = await response.json();
    removeTyping();
    
    if (data.content && data.content[0] && data.content[0].text) {
      const reply = data.content[0].text;
      conversationHistory.push({ role: 'assistant', content: reply });
      addMessage('ai', reply);
    } else {
      addErrorMessage(i18n[currentLang].error);
    }
  } catch (err) {
    removeTyping();
    console.error(err);
    addErrorMessage(i18n[currentLang].error);
  }
  
  isProcessing = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}

function addErrorMessage(msg) {
  hideWelcome();
  const area = document.getElementById('messagesArea');
  const div = document.createElement('div');
  div.innerHTML = `<div class="error-msg">${msg}</div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

// INIT
setLang('fr');
</script>
