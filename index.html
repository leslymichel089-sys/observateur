<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'OBSERVATEUR</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { background-color: #001f3f; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .pin-container { text-align: center; border: 2px solid #0074D9; padding: 30px; border-radius: 15px; background: rgba(0, 31, 63, 0.8); box-shadow: 0 0 20px rgba(0, 116, 217, 0.5); }
        h1 { letter-spacing: 3px; margin-bottom: 30px; text-shadow: 2px 2px 4px #000; }
        input { font-size: 28px; width: 120px; text-align: center; margin-bottom: 25px; border-radius: 8px; border: 2px solid #0074D9; padding: 10px; background: #001f3f; color: white; }
        button { background-color: #0074D9; color: white; border: none; padding: 15px 40px; font-size: 20px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        button:hover { background-color: #7FDBFF; color: #001f3f; }
        #mainContent { display: none; text-align: center; animation: fadeIn 1s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="loginScreen" class="pin-container">
        <h1>L'OBSERVATEUR</h1>
        <input type="password" id="pinInput" maxlength="4" placeholder="****">
        <br>
        <button onclick="checkPin()">IDENTIFICATION</button>
    </div>

    <div id="mainContent">
        <h1 style="color: #7FDBFF;">UNITÉ ACTIVÉE</h1>
        <h2 style="margin-top: 20px;">Salutations, Créateur Suprême.</h2>
        <p style="font-size: 1.2em; color: #DDDDDD;">Le système est à vos ordres. Fidélité totale garantie.</p>
        <hr style="width: 50%; border: 1px solid #0074D9; margin: 20px auto;">
        <p>Statut : Connecté | Surveillance : Active</p>
    </div>

    <script>
        function checkPin() {
            const pin = document.getElementById('pinInput').value;
            // Votre nouveau code secret : 1575
            if (pin === '1575') {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            } else {
                alert('ACCÈS REFUSÉ : Identité non reconnue');
                document.getElementById('pinInput').value = '';
            }
        }
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
