<div class="card">
    <h3 style="color:var(--gold);">🛠️ CENTRE DE COMMANDE</h3>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px;">
        <button class="btn-gold" style="font-size:10px; padding:15px;" onclick="generateCV()">📄 GÉNÉRER CV</button>
        <button class="btn-gold" style="font-size:10px; padding:15px;" onclick="prepareMessage('whatsapp')">💬 WHATSAPP</button>
        <button class="btn-gold" style="font-size:10px; padding:15px;" onclick="prepareMessage('email')">📧 EMAIL</button>
        <button class="btn-gold" style="font-size:10px; padding:15px; background:#ff4d4d; color:#fff;" onclick="location.reload()">🚨 RESET</button>
    </div>
</div>

<div class="card">
    <h3>🧠 ASSIMILATION DE DONNÉES</h3>
    <textarea id="pasteZone" style="width:100%; height:80px; background:#000; border:1px dashed var(--gold); border-radius:10px; color:var(--blue); padding:10px; margin-bottom:10px;" placeholder="Collez un texte externe ici..."></textarea>
    <button class="btn-gold" style="width:100%; font-size:12px;" onclick="assimilate()">ANALYSER & MÉMORISER</button>
</div>
