<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L'OBSERVATEUR - LIAISON VOCALE</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #0c0e12; --card: #1a1e26; --blue: #7FDBFF; }
        body { background-color: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 25px; text-align: center; border-bottom: 2px solid var(--gold); background: #0f1217; }
        .creator-tag { color: var(--blue); font-size: 0.8em; font-weight: bold; margin-top: 5px; text-transform: uppercase; }
        
        .page { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .card { background: var(--card); border: 2px solid var(--gold); border-radius: 25px; padding: 40px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 0 30px rgba(0,0,0,0.5); }

        /* BOUTON MICROPHONE AMÉLIORÉ */
        #micBtn { width: 120px; height: 120px; border-radius: 50%; background: var(--gold); border: 4px solid #000; font-size: 50px; cursor: pointer; transition: 0.3s; position: relative; z-index: 10; }
        .listening { background: #ff4d4d !important; animation: pulse 1s infinite; box-shadow: 0 0 50px #ff4d4d; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        #transcript { margin-top: 30px; font-weight: 900; color: var(--blue); font-size: 1.2em; min-height: 1.5em; text-transform: uppercase; }
        #status { font-size: 0.7em; letter-spacing: 2px; margin-bottom: 15px; color: #777; }
        
        nav { display: flex; background: #0f1217; border-top: 3px solid var(--gold); height: 110px; width: 100%; }
        nav button { flex: 1; background: none; border: none; color: var(--gold); font-weight: 900; font-size: 14px; }
    </style>
</head>
<body>

    <header>
        <h1 style="margin:0; color:var(--gold); letter-spacing:5px;">L'OBSERVATEUR</h1>
        <div class="creator-tag">Lesly Michel [Créateur Suprême]</div>
    </header>

    <div class="page">
        <div class="card">
            <div id="status">SYSTÈME PRÊT</div>
            <button id="micBtn" onclick="activateVocal()">🎙️</button>
            <div id="transcript">Appuyez pour parler</div>
        </div>
    </div>

    <nav><button onclick="location.reload()">🔒 RÉINITIALISER</button></nav>

    <script>
        let userLang = 'fr-FR';
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        
        recognition.lang = userLang;
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        // SYNTHÈSE VOCALE (RÉPONSE)
        function respond(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = userLang;
            msg.rate = (userLang === 'ht-HT') ? 0.8 : 0.95;
            window.speechSynthesis.speak(msg);
        }

        function activateVocal() {
            // Débloquer l'audio sur mobile (obligatoire sur iPhone/Android)
            respond(""); 
            try {
                recognition.start();
                document.getElementById('micBtn').classList.add('listening');
                document.getElementById('status').innerText = "L'UNITÉ ÉCOUTE...";
            } catch (e) {
                recognition.stop();
            }
        }

        recognition.onresult = (event) => {
            const result = event.results[0][0].transcript.toLowerCase();
            document.getElementById('transcript').innerText = result;
            
            // LOGIQUE DE RÉPONSE IMMÉDIATE
            if (result.includes("bonjour")) {
                respond("Salutations, Créateur Suprême. L'unité est opérationnelle.");
            } else if (result.includes("kreyòl")) {
                userLang = 'ht-HT';
                recognition.lang = 'ht-HT';
                respond("Respe. Mwen pale kreyòl kounye a.");
            } else {
                respond("J'ai entendu : " + result + ". Analyse en cours.");
            }
        };

        recognition.onend = () => {
            document.getElementById('micBtn').classList.remove('listening');
            document.getElementById('status').innerText = "SYSTÈME PRÊT";
        };

        recognition.onerror = () => {
            document.getElementById('micBtn').classList.remove('listening');
        };
    </script>
</body>
</html>
