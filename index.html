<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L'OBSERVATEUR - LEXIQUE SUPRÊME</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #0c0e12; --card: #1a1e26; --blue: #7FDBFF; --text: #ffffff; }
        * { box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        #lockScreen, #identifyScreen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 5000; padding: 20px; transition: 0.5s; }
        .input-supreme { font-size: 20px; width: 90%; max-width: 400px; background: #000; border: 2px solid var(--gold); color: var(--gold); border-radius: 15px; padding: 15px; text-align: center; outline: none; margin-bottom: 20px; }
        .btn-action { background: var(--gold); color: #000; padding: 18px 45px; border-radius: 35px; border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; }

        header { padding: 15px; text-align: center; border-bottom: 1px solid rgba(212,175,55,0.3); background: #0f1217; }
        .dashboard-info { display: flex; justify-content: space-between; padding: 8px 15px; background: rgba(0,0,0,0.4); font-size: 0.7em; color: var(--blue); }

        .page { display: none; flex: 1; overflow-y: auto; padding: 20px; animation: fadeIn 0.3s ease; }
        .active-page { display: block; }
        .card { background: var(--card); border: 1px solid var(--gold); border-radius: 18px; padding: 20px; margin-bottom: 15px; }

        .dict-result { margin-top: 15px; padding: 15px; background: rgba(0,0,0,0.5); border-radius: 10px; border-left: 4px solid var(--blue); }

        nav { display: flex; background: #0f1217; border-top: 2px solid var(--gold); height: 80px; }
        nav button { flex: 1; background: none; border: none; color: #555; font-size: 10px; font-weight: 900; }
        nav button.active { color: var(--gold); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="lockScreen">
        <h1 style="color:var(--gold); letter-spacing:5px;">L'OBSERVATEUR</h1>
        <input type="password" id="pinInput" class="input-supreme" style="width:150px;" maxlength="4" placeholder="••••">
        <button class="btn-action" onclick="checkPin()">ACCÉDER</button>
    </div>

    <div id="identifyScreen" style="display:none;">
        <h2 style="color:var(--blue);">IDENTIFICATION REQUISE</h2>
        <input type="text" id="nameInput" class="input-supreme" placeholder="Entrez votre nom">
        <button class="btn-action" onclick="identifyUser()">CONFIRMER</button>
    </div>

    <header><h1>L'OBSERVATEUR</h1></header>
    <div class="dashboard-info">
        <div id="dateNow">Date</div>
        <div id="userTag">👤 --</div>
        <div id="tempNow">☀️ 22°C</div>
    </div>

    <div id="home" class="page active-page">
        <div class="card">
            <h3 id="welcomeMsg">Initialisation...</h3>
            <p id="roleMsg" style="color:var(--blue); font-size:0.8em;"></p>
        </div>
        <div class="card" onclick="showPage('lexicon')">
            <h3>🌍 DICTIONNAIRE MULTILINGUE</h3>
            <p>Traduisez et apprenez : Français, Créole, Anglais, Espagnol.</p>
        </div>
    </div>

    <div id="lexicon" class="page">
        <div class="card">
            <h3 style="color:var(--blue);">🔍 TRADUCTEUR & LEXIQUE</h3>
            <input type="text" id="wordQuery" class="input-supreme" style="font-size:18px; width:100%;" placeholder="Mot à traduire...">
            <select id="langTarget" class="input-supreme" style="font-size:14px; width:100%;">
                <option value="en">Vers l'Anglais</option>
                <option value="ht">Vers le Créole</option>
                <option value="es">Vers l'Espagnol</option>
                <option value="fr">Vers le Français</option>
            </select>
            <button class="btn-action" style="width:100%;" onclick="translateWord()">TRADUIRE</button>
            
            <div id="dictResult" class="dict-result" style="display:none;">
                <strong style="color:var(--gold);">Résultat :</strong>
                <p id="translatedWord" style="font-size:1.4em; margin:10px 0;"></p>
                <button class="btn-action" style="padding:10px 20px; font-size:12px;" onclick="pronounceResult()">🔊 ÉCOUTER</button>
            </div>
        </div>
    </div>

    <nav>
        <button class="active" onclick="showPage('home')">🏠 Accueil</button>
        <button onclick="showPage('lexicon')">📖 Lexique</button>
        <button onclick="location.reload()">🔒 Sortie</button>
    </nav>

    <script>
        const familyDB = ["Lesly Michel", "Guerda", "Jean-Daniel Lesly", "Samuel", "Léïssa", "Luc", "Esterlande Belfond", "Esterlande"];
        let lastTranslation = "";

        function speak(t, lang = 'fr-FR') {
            if (window.speechSynthesis.speaking) window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t); u.lang = lang; u.rate = 0.9;
            window.speechSynthesis.speak(u);
        }

        function checkPin() {
            if (document.getElementById('pinInput').value === '1575') {
                document.getElementById('lockScreen').style.display = 'none';
                const saved = localStorage.getItem('currentUser');
                if (saved) loginSuccess(saved);
                else document.getElementById('identifyScreen').style.display = 'flex';
            }
        }

        function identifyUser() {
            const name = document.getElementById('nameInput').value.trim();
            if (familyDB.some(m => name.toLowerCase().includes(m.toLowerCase()))) {
                localStorage.setItem('currentUser', name);
                loginSuccess(name);
            } else { alert("Nom non reconnu."); }
        }

        function loginSuccess(name) {
            document.getElementById('identifyScreen').style.display = 'none';
            document.getElementById('userTag').innerText = "👤 " + name;
            document.getElementById('welcomeMsg').innerText = "Unité à votre service, " + name;
            speak("Identification réussie. Bonjour " + name);
        }

        function translateWord() {
            const word = document.getElementById('wordQuery').value.toLowerCase();
            const target = document.getElementById('langTarget').value;
            const res = document.getElementById('dictResult');
            const output = document.getElementById('translatedWord');
            
            // Simulation de base de données (Sera remplacée par API Toro509)
            let result = "Recherche via Toro509 requise...";
            if(word === "bonjour" && target === "en") result = "Hello";
            if(word === "bonjour" && target === "ht") result = "Bonjou";
            if(word === "maison" && target === "es") result = "Casa";
            
            lastTranslation = result;
            output.innerText = result;
            res.style.display = 'block';
            speak("Traduction effectuée.");
        }

        function pronounceResult() {
            const target = document.getElementById('langTarget').value;
            let langCode = 'en-US';
            if(target === 'ht') langCode = 'fr-FR'; // Approximation créole
            if(target === 'es') langCode = 'es-ES';
            speak(lastTranslation, langCode);
        }

        function showPage(p) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active-page'));
            document.getElementById(p).classList.add('active-page');
        }

        setInterval(() => {
            const now = new Date();
            document.getElementById('dateNow').innerText = now.toLocaleDateString('fr-FR', {day:'numeric', month:'long'});
            document.getElementById('timeNow').innerText = now.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
        }, 1000);
    </script>
</body>
</html>
