<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L'OBSERVATEUR SUPRÊME</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #0c0e12; --card: #1a1e26; --blue: #7FDBFF; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { padding: 30px; text-align: center; border-bottom: 2px solid var(--gold); background: #0f1217; position: relative; }
        header h1 { margin: 0; font-size: 1.5em; letter-spacing: 5px; color: var(--gold); }
        .creator-tag { color: var(--blue); font-size: 0.8em; font-weight: bold; margin-top: 5px; }

        .page { display: none; flex: 1; overflow-y: auto; padding: 20px; animation: fadeIn 0.3s ease; }
        .active-page { display: block; }
        .card { background: var(--card); border: 1px solid var(--gold); border-radius: 20px; padding: 25px; margin-bottom: 20px; text-align: center; }

        /* BOUTON MICROPHONE GÉANT */
        .mic-btn { width: 100px; height: 100px; border-radius: 50%; background: var(--gold); border: none; font-size: 40px; color: #000; cursor: pointer; box-shadow: 0 0 20px var(--gold); margin: 20px auto; display: block; transition: 0.3s; }
        .mic-active { background: #ff4d4d; box-shadow: 0 0 30px #ff4d4d; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* MENU LANGUE RAPIDE */
        .lang-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .lang-btn { background: #333; border: 1px solid var(--gold); color: #fff; padding: 10px; border-radius: 8px; font-size: 12px; }

        nav { display: flex; background: #0f1217; border-top: 3px solid var(--gold); height: 110px; }
        nav button { flex: 1; background: none; border: none; color: #666; font-size: 14px; font-weight: 900; text-transform: uppercase; }
        nav button.active { color: var(--gold); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <h1>L'OBSERVATEUR</h1>
        <div class="creator-tag">Lesly Michel [Créateur Suprême]</div>
    </header>

    <div id="home" class="page active-page">
        <div class="card">
            <h3 id="statusText">Système Vocal Prêt</h3>
            <button id="micBtn" class="mic-btn" onclick="toggleSpeech()">🎙️</button>
            <p id="transcript" style="color:var(--blue); min-height: 20px; font-style: italic;"></p>
        </div>
        
        <div class="lang-bar">
            <button class="lang-btn" onclick="setLang('fr-FR')">FRANÇAIS</button>
            <button class="lang-btn" onclick="setLang('ht-HT')">KREYÒL</button>
            <button class="lang-btn" onclick="setLang('en-US')">ENGLISH</button>
        </div>
    </div>

    <nav>
        <button class="active" onclick="showPage('home')">🏠 Accueil</button>
        <button onclick="location.reload()">🔒 Sortie</button>
    </nav>

    <script>
        let currentLang = 'fr-FR';
        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const rec = Recognition ? new Recognition() : null;

        if (rec) {
            rec.continuous = false;
            rec.interimResults = false;
            rec.onresult = (e) => {
                const text = e.results[0][0].transcript.toLowerCase();
                document.getElementById('transcript').innerText = `"${text}"`;
                handleVoiceCommand(text);
            };
            rec.onend = () => document.getElementById('micBtn').classList.remove('mic-active');
        }

        function setLang(l) {
            currentLang = l;
            let msg = "Langue modifiée.";
            if(l === 'ht-HT') msg = "Mwen pale Kreyòl kounye a.";
            if(l === 'en-US') msg = "Language switched to English.";
            speak(msg);
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = currentLang;
            u.rate = currentLang === 'ht-HT' ? 0.8 : 0.95; // Ralentir pour le créole
            u.pitch = 1;
            window.speechSynthesis.speak(u);
        }

        function toggleSpeech() {
            if (!rec) return alert("Vocal non supporté sur ce navigateur.");
            document.getElementById('micBtn').classList.add('mic-active');
            rec.lang = currentLang;
            rec.start();
        }

        function handleVoiceCommand(cmd) {
            if (cmd.includes("kreyòl") || cmd.includes("créole")) {
                setLang('ht-HT');
            } else if (cmd.includes("français")) {
                setLang('fr-FR');
            } else if (cmd.includes("english") || cmd.includes("anglais")) {
                setLang('en-US');
            } else {
                speak(currentLang === 'ht-HT' ? "Mwen tande ou, men mwen poko konprann sa." : "Je vous entends, mais je n'ai pas encore cette instruction.");
            }
        }

        function showPage(p) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active-page'));
            document.getElementById(p).classList.add('active-page');
        }
    </script>
</body>
</html>
