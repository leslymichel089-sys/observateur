<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L'OBSERVATEUR</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #0c0e12; --card: #1a1e26; --blue: #7FDBFF; --plasma: rgba(127, 219, 255, 0.6); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* ANIMA-CŒUR RESTAURÉ */
        .plasma-ring { position: absolute; border-radius: 50%; border: 3px solid transparent; border-top-color: var(--blue); border-bottom-color: var(--gold); animation: plasmaRotate 2s linear infinite; box-shadow: 0 0 30px var(--plasma); z-index: 1; }
        @keyframes plasmaRotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

        /* ÉCRANS D'ACCÈS */
        #lockScreen, #identifyScreen, #langSelect { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 5000; text-align: center; padding: 20px; }
        .input-supreme { font-size: 24px; width: 90%; max-width: 400px; background: #000; border: 3px solid var(--gold); color: var(--gold); border-radius: 15px; padding: 20px; text-align: center; margin-bottom: 20px; }
        .btn-giant { width: 90%; max-width: 400px; background: var(--gold); color: #000; padding: 25px; border-radius: 50px; border: none; font-weight: 900; font-size: 1.2em; text-transform: uppercase; cursor: pointer; box-shadow: 0 0 20px rgba(212,175,55,0.4); }

        /* INTERFACE MAÎTRE */
        header { padding: 40px 20px; text-align: center; border-bottom: 2px solid var(--gold); background: #0f1217; position: relative; }
        header h1 { margin: 0; font-size: 1.8em; letter-spacing: 7px; color: var(--gold); position: relative; z-index: 10; }
        .creator-tag { color: var(--blue); font-size: 0.9em; font-weight: bold; margin-top: 10px; letter-spacing: 2px; }

        .dashboard-info { display: flex; justify-content: space-between; padding: 15px 25px; background: rgba(0,0,0,0.6); font-size: 0.85em; color: var(--blue); border-bottom: 1px solid var(--gold); }

        .page { display: none; flex: 1; overflow-y: auto; padding: 25px; animation: fadeIn 0.4s ease; }
        .active-page { display: block; }
        .card { background: var(--card); border: 2px solid rgba(212,175,55,0.3); border-radius: 25px; padding: 30px; margin-bottom: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.7); }
        
        /* NAVIGATION GÉANTE */
        nav { display: flex; background: #0f1217; border-top: 3px solid var(--gold); height: 120px; padding-bottom: env(safe-area-inset-bottom); }
        nav button { flex: 1; background: none; border: none; color: #555; font-size: 14px; font-weight: 900; text-transform: uppercase; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
        nav button.active { color: var(--gold); }
        nav button span { font-size: 35px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="lockScreen">
        <h1 style="color:var(--gold); letter-spacing:8px; margin-bottom:40px;">L'OBSERVATEUR</h1>
        <input type="password" id="pinInput" class="input-supreme" style="width:180px;" maxlength="4" placeholder="••••">
        <button class="btn-giant" onclick="checkPin()">DÉVERROUILLER</button>
    </div>

    <div id="identifyScreen" style="display:none;">
        <h2 style="color:var(--blue);">QUI DEMANDE L'ACCÈS ?</h2>
        <input type="text" id="nameInput" class="input-supreme" placeholder="VOTRE NOM">
        <button class="btn-giant" onclick="identify()">S'IDENTIFIER</button>
    </div>

    <div id="langSelect" style="display:none;">
        <h2 style="color:var(--gold);">CHOISISSEZ VOTRE LANGUE</h2>
        <button class="btn-giant" style="margin:10px;" onclick="setLang('fr-FR', 'Bienvenue')">FRANÇAIS</button>
        <button class="btn-giant" style="margin:10px;" onclick="setLang('ht-HT', 'Respe')">KREYÒL</button>
        <button class="btn-giant" style="margin:10px;" onclick="setLang('en-US', 'Welcome')">ENGLISH</button>
    </div>

    <header>
        <div id="plasma" class="plasma-ring" style="width:150px; height:150px; top:50%; left:50%;"></div>
        <h1>L'OBSERVATEUR</h1>
        <div class="creator-tag">Lesly Michel [Créateur Suprême]</div>
    </header>

    <div class="dashboard-info">
        <div id="dateNow">Date</div>
        <div id="userTag">👤 --</div>
        <div id="tempNow">☀️ 24°C</div>
    </div>

    <div id="home" class="page active-page">
        <div class="card" onclick="speak('Rapport de sécurité : Système prêt.')">
            <h3 id="welcomeMsg">Unité Prête</h3>
            <p id="roleMsg" style="color:var(--blue); font-weight:bold;"></p>
        </div>
        <div class="card">
            <h3>📜 Sagesse du Jour</h3>
            <p id="pwovebDisp">"Piti piti zwazo fè nich li."</p>
        </div>
    </div>

    <div id="academy" class="page">
        <div class="card">
            <h3>📖 Encyclopédie & Lexique</h3>
            <input type="text" id="wikiIn" class="input-supreme" style="width:100%; font-size:18px;" placeholder="Votre question ou traduction...">
            <button class="btn-giant" style="width:100%; background:var(--blue);" onclick="askWiki()">Interroger</button>
            <div id="wikiOut" style="margin-top:20px; padding:15px; border-left:3px solid var(--gold); display:none;"></div>
        </div>
    </div>

    <nav>
        <button class="active" onclick="showPage('home')"><span>🏠</span>Accueil</button>
        <button onclick="showPage('academy')"><span>📚</span>Savoir</button>
        <button onclick="location.reload()"><span>🔒</span>Sortie</button>
    </nav>

    <script>
        const family = ["Lesly Michel", "Guerda", "Jean-Daniel Lesly", "Samuel", "Léïssa", "Luc", "Esterlande Belfond", "Esterlande"];
        let uLang = "fr-FR";

        function speak(t) {
            if (window.speechSynthesis.speaking) window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t); u.lang = uLang; u.rate = 0.9;
            window.speechSynthesis.speak(u);
        }

        function checkPin() {
            if (document.getElementById('pinInput').value === '1575') {
                document.getElementById('lockScreen').style.display = 'none';
                const s = localStorage.getItem('obsUser');
                if(s) login(s); else document.getElementById('identifyScreen').style.display = 'flex';
            }
        }

        function identify() {
            const n = document.getElementById('nameInput').value.trim();
            if(family.some(m => n.toLowerCase().includes(m.toLowerCase()))) {
                localStorage.setItem('obsUser', n);
                document.getElementById('identifyScreen').style.display = 'none';
                document.getElementById('langSelect').style.display = 'flex';
            } else { speak("Nom inconnu."); }
        }

        function setLang(l, greet) {
            uLang = l;
            document.getElementById('langSelect').style.display = 'none';
            login(localStorage.getItem('obsUser'), greet);
        }

        function login(n, g = "Bienvenue") {
            document.getElementById('userTag').innerText = "👤 " + n;
            document.getElementById('welcomeMsg').innerText = g + ", " + n;
            speak(g + " " + n + ". L'Observateur est à votre service.");
            if(n.includes("Lesly Michel")) document.getElementById('roleMsg').innerText = "ACCÈS CRÉATEUR SUPRÊME";
            else document.getElementById('roleMsg').innerText = "ACCÈS FAMILLE";
        }

        function askWiki() {
            const q = document.getElementById('wikiIn').value.toLowerCase();
            const out = document.getElementById('wikiOut');
            out.style.display = 'block';
            let r = "Analyse en cours dans les archives Michel...";
            if(q.includes("math")) r = "Les mathématiques sont le langage de l'univers.";
            if(q.includes("bonjour")) r = "Hello (En), Bonjou (Ht), Hola (Es).";
            out.innerText = r; speak(r);
        }

        function showPage(p) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active-page'));
            document.getElementById(p).classList.add('active-page');
            speak("Accès au module " + p);
        }

        setInterval(() => {
            const now = new Date();
            document.getElementById('dateNow').innerText = now.toLocaleDateString('fr-FR', {day:'numeric', month:'long'});
        }, 1000);
    </script>
</body>
</html>
