<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L'OBSERVATEUR - PRESTIGE</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #0c0e12; --card: #1a1e26; --blue: #7FDBFF; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; height: 100vh; width: 100vw; display: flex; flex-direction: column; overflow: hidden; }
        
        /* ANIMA-CŒUR IMPOSANTE */
        .plasma-ring { position: absolute; border-radius: 50%; border: 4px solid transparent; border-top-color: var(--blue); border-bottom-color: var(--gold); animation: spin 1.5s linear infinite; box-shadow: 0 0 30px var(--blue); z-index: 1; pointer-events: none; }
        @keyframes spin { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

        header { padding: 30px 15px; text-align: center; border-bottom: 3px solid var(--gold); background: #0f1217; position: relative; display: flex; align-items: center; justify-content: center; min-height: 100px; }
        header h1 { font-size: 1.4em; letter-spacing: 5px; color: var(--gold); text-transform: uppercase; z-index: 10; }
        .creator-tag { position: absolute; bottom: 8px; font-size: 0.7em; color: var(--blue); font-weight: 900; letter-spacing: 2px; }

        .dashboard-info { display: flex; justify-content: space-between; padding: 12px 20px; background: rgba(0,0,0,0.8); font-size: 0.8em; color: var(--blue); border-bottom: 2px solid var(--gold); }

        .page { display: none; flex: 1; overflow-y: auto; padding: 25px; width: 100%; animation: fadeIn 0.4s ease; }
        .active-page { display: block; }
        .card { background: var(--card); border: 3px solid rgba(212,175,55,0.4); border-radius: 25px; padding: 25px; margin-bottom: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }

        .btn-gold { background: var(--gold); color: #000; padding: 18px; border-radius: 35px; border: none; font-weight: 900; text-transform: uppercase; cursor: pointer; width: 100%; box-shadow: 0 0 15px var(--gold); margin-top: 10px; }
        .input-supreme { font-size: 18px; width: 100%; background: #000; border: 2px solid var(--gold); color: #fff; border-radius: 12px; padding: 15px; margin-bottom: 15px; text-align: center; }

        nav { display: flex; background: #0f1217; border-top: 4px solid var(--gold); height: 110px; padding-bottom: env(safe-area-inset-bottom); }
        nav button { flex: 1; background: none; border: none; color: #555; font-size: 12px; font-weight: 900; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        nav button.active { color: var(--gold); }
        nav button span { font-size: 35px; margin-bottom: 5px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <div class="plasma-ring" style="width:140px; height:140px; top:50%; left:50%;"></div>
        <h1>L'OBSERVATEUR</h1>
        <div class="creator-tag">CRÉATION DE LESLY MICHEL</div>
    </header>

    <div class="dashboard-info">
        <div id="dateNow">Date</div>
        <div id="timeNow">00:00</div>
        <div id="tempNow">Greensboro: 22°C</div>
    </div>

    <div id="home" class="page active-page">
        <div class="card">
            <h3 style="color:var(--gold); margin-bottom:15px;">NOYAU PRÊT</h3>
            <button onclick="startVocal()" style="width:100px; height:100px; border-radius:50%; background:var(--gold); border:4px solid #000; font-size:40px;">🎙️</button>
            <p id="transcript" style="color:var(--blue); font-weight:bold; margin-top:15px;"></p>
        </div>
    </div>

    <div id="vault" class="page">
        <div class="card">
            <h3 style="color:var(--gold);">💎 TRÉSOR DE GUERDA</h3>
            <p id="gMsg" style="text-align:left; border-left:4px solid var(--gold); padding-left:15px; font-style:italic;">Bienvenue dans la Caverne.</p>
        </div>
        <div class="card">
            <h3 style="color:var(--gold);">🛠️ OUTILS & SURVEILLANCE</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button class="btn-gold" style="font-size:10px;" onclick="location.reload()">🔄 RESET</button>
                <button class="btn-gold" style="font-size:10px;" onclick="window.open('https://wa.me/')">💬 WHATSAPP</button>
            </div>
        </div>
    </div>

    <nav>
        <button class="active" onclick="showPage('home')"><span>🏠</span>Accueil</button>
        <button onclick="showPage('vault')"><span>🔐</span>Caverne</button>
        <button onclick="location.reload()"><span>🔄</span>Reset</button>
    </nav>

    <script>
        function showPage(p) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active-page'));
            document.getElementById(p).classList.add('active-page');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            // Gestion simplifiée pour le test
        }

        setInterval(() => {
            const now = new Date();
            document.getElementById('dateNow').innerText = now.toLocaleDateString('fr-FR', {day:'numeric', month:'short'}).toUpperCase();
            document.getElementById('timeNow').innerText = now.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
        }, 1000);

        function startVocal() {
            window.speechSynthesis.speak(new SpeechSynthesisUtterance("L'unité est active, Créateur."));
        }
    </script>
</body>
</html>
